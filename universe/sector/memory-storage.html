order-left:3px solid var(--accent);border-radius:var(--radius-sm);font-size:var(--fs-body-sm);color:var(--text-2);line-height:1.6;\">\n    \u003cstrong style=\"color:var(--text-1);\">价值垂直分层判断\u003c/strong>：HBM 物理硬约束（&lt;1mm）让上游 IDM 议价权从\"被周期摆弄\"变成\"卡 hyperscaler 脖子\"——SK Hynix Q1 2026 营业利润率 \u003cstrong style=\"color:var(--green-strong);\">71.5%\u003c/strong>（半导体行业有史以来最高之一）。三层不是\"快慢替代\"关系，而是在\"延迟-成本-容量\"三角里各自守住不可替代的角落。\n  \u003c/div>\n\u003c/div>\n"}, {"type": "key-metrics-cards", "title": "赛道核心数字 · 六卡（overview support）", "section": "overview", "body": "\u003cdiv class=\"cortex-module-key-metrics-cards\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;\">\n  \u003cdiv style=\"background:var(--bg-1);border:1px solid var(--border);border-left:3px solid var(--green-strong);border-radius:var(--radius-md);padding:14px 16px;\">\n    \u003cdiv style=\"font-size:var(--fs-caption);color:var(--text-3);letter-spacing:.4px;margin-bottom:4px;\">HBM TAM\u003c/div>\n    \u003cdiv style=\"font-size:24px;font-weight:700;color:var(--text-1);line-height:1.1;\">$32.6B\u003c/div>\n    \u003cdiv style=\"font-size:var(--fs-body-sm);color:var(--green-strong);font-weight:600;margin-top:4px;\">YoY +70%\u003c/div>\n    \u003cdiv style=\"font-size:var(--fs-caption);color:var(--text-3);margin-top:4px;\">2026E · 最大利润集中\u003c/div>\n  \u003c/div>\n  \u003cdiv style=\"background:var(--bg-1);border:1px solid var(--border);border-left:3px solid var(--green-strong);border-radius:var(--radius-md);padding:14px 16px;\">\n    \u003cdiv style=\"font-size:var(--fs-caption);color:var(--text-3);letter-spacing:.4px;margin-bottom:4px;\">DRAM TAM\u003c/div>\n    \u003cdiv style=\"font-size:24px;font-weight:700;color:var(--text-1);line-height:1.1;\">$200B+\u003c/div>\n    \u003cdiv style=\"font-size:var(--fs-body-sm);color:var(--green-strong);font-weight:600;margin-top:4px;\">YoY +50%+\u003c/div>\n    \u003cdiv style=\"font-size:var(--fs-caption);color:var(--text-3);margin-top:4px;\">含 HBM · 2026E\u003c/div>\n  \u003c/div>\n  \u003cdiv style=\"background:var(--bg-1);border:1px solid var(--border);border-left:3px solid var(--cyan);border-radius:var(--radius-md);padding:14px 16px;\">\n    \u003cdiv style=\"font-size:var(--fs-caption);color:var(--text-3);letter-spacing:.4px;margin-bottom:4px;\">NAND TAM\u003c/div>\n    \u003cdiv style=\"font-size:24px;font-weight:700;color:var(--text-1);line-height:1.1;\">$93.8B\u003c/div>\n    \u003cdiv style=\"font-size:var(--fs-body-sm);color:var(--cyan);font-weight:600;margin-top:4px;\">YoY +45%\u003c/div>\n    \u003cdiv style=\"font-size:var(--fs-caption);color:var(--text-3);margin-top:4px;\">2026E\u003c/div>\n  \u003c/div>\n  \u003cdiv style=\"background:var(--bg-1);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:var(--radius-md);padding:14px 16px;\">\n    \u003cdiv style=\"font-size:var(--fs-caption);color:var(--text-3);letter-spacing:.4px;margin-bottom:4px;\">HDD nearline\u003c/div>\n    \u003cdiv style=\"font-size:24px;font-weight:700;color:var(--text-1);line-height:1.1;\">~$15B\u003c/div>\n    \u003cdiv style=\"font-size:var(--fs-body-sm);color:var(--amber);font-weight:600;margin-top:4px;\">YoY +30%\u003c/div>\n    \u003cdiv style=\"font-size:var(--fs-caption);color:var(--text-3);margin-top:4px;\">capacity-driven\u003c/div>\n  \u003c/div>\n  \u003cdiv style=\"background:var(--bg-1);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:var(--radius-md);padding:14px 16px;\">\n    \u003cdiv style=\"font-size:var(--fs-caption);color:var(--text-3);letter-spacing:.4px;margin-bottom:4px;\">MU forward PE\u003c/div>\n    \u003cdiv style=\"font-size:24px;font-weight:700;color:var(--text-1);line-height:1.1;\">7.13x\u003c/div>\n    \u003cdiv style=\"font-size:var(--fs-body-sm);color:var(--red);font-weight:600;margin-top:4px;\">折价 79%\u003c/div>\n    \u003cdiv style=\"font-size:var(--fs-caption);color:var(--text-3);margin-top:4px;\">vs 半导体中位 34.29x\u003c/div>\n  \u003c/div>\n  \u003cdiv style=\"background:var(--bg-1);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:var(--radius-md);padding:14px 16px;\">\n    \u003cdiv style=\"font-size:var(--fs-caption);color:var(--text-3);letter-spacing:.4px;margin-bottom:4px;\">SK Hynix Q1 op margin\u003c/div>\n    \u003cdiv style=\"font-size:24px;font-weight:700;color:var(--text-1);line-height:1.1;\">71.5%\u003c/div>\n    \u003cdiv style=\"font-size:var(--fs-body-sm);color:var(--green);font-weight:600;margin-top:4px;\">历史峰值\u003c/div>\n    \u003cdiv style=\"font-size:var(--fs-caption);color:var(--text-3);margin-top:4px;\">半导体史最高之一\u003c/div>\n  \u003c/div>\n\u003c/div>\n"}, {"type": "nvda-allocator-triangle-svg", "title": "NVDA 分单决定权三角——赛道独有的\"裁判员\"博弈结构（hero · competition）", "section": "competition", "body": "\u003cdiv class=\"cortex-module-nvda-allocator-triangle-svg\" style=\"background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px 20px;\">\n  \u003cdiv style=\"font-size:var(--fs-body);color:var(--text-2);margin-bottom:6px;letter-spacing:.3px;\">赛道 anchor #2\u003c/div>\n  \u003cdiv style=\"font-size:var(--fs-headline);font-weight:700;color:var(--text-1);margin-bottom:4px;\">NVDA 是裁判员，不是单纯客户\u003c/div>\n  \u003cdiv style=\"font-size:var(--fs-body);color:var(--text-3);margin-bottom:16px;\">三家 HBM IDM 的份额不是市场博弈决定，是 NVDA 配额——故意不让 SK 一家独大，给 Samsung 第二次机会，给 MU 喂份额。TSMC CoWoS + EAR ECCN 3A090.c 把 CXMT/YMTC 锁在 5+ 年外。\u003c/div>\n  \u003csvg viewBox=\"0 0 760 380\" style=\"width:100%;height:auto;display:block;\" role=\"img\" aria-label=\"NVDA 分单决定权三角\">\n    \u003cdefs>\n      \u003clinearGradient id=\"msNvdaCard\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n        \u003cstop offset=\"0%\" stop-color=\"rgba(31,122,82,0.18)\"/>\n        \u003cstop offset=\"100%\" stop-color=\"rgba(31,122,82,0.04)\"/>\n      \u003c/linearGradient>\n      \u003clinearGradient id=\"msSKCard\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n        \u003cstop offset=\"0%\" stop-color=\"rgba(31,122,82,0.22)\"/>\n        \u003cstop offset=\"100%\" stop-color=\"rgba(31,122,82,0.06)\"/>\n      \u003c/linearGradient>\n      \u003clinearGradient id=\"msMUCard\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n        \u003cstop offset=\"0%\" stop-color=\"rgba(184,122,31,0.18)\"/>\n        \u003cstop offset=\"100%\" stop-color=\"rgba(184,122,31,0.05)\"/>\n      \u003c/linearGradient>\n      \u003clinearGradient id=\"msSamsungCard\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n        \u003cstop offset=\"0%\" stop-color=\"rgba(86,102,93,0.18)\"/>\n        \u003cstop offset=\"100%\" stop-color=\"rgba(86,102,93,0.06)\"/>\n      \u003c/linearGradient>\n      \u003cmarker id=\"msArrowAccent\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\">\n        \u003cpath d=\"M0,0 L10,5 L0,10 Z\" fill=\"var(--accent)\"/>\n      \u003c/marker>\n      \u003cmarker id=\"msArrowRed\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\">\n        \u003cpath d=\"M0,0 L10,5 L0,10 Z\" fill=\"var(--red)\"/>\n      \u003c/marker>\n    \u003c/defs>\n\n    \u003c!-- 背景 dot grid -->\n    \u003crect width=\"760\" height=\"380\" fill=\"url(#cortex-dot-grid)\" opacity=\"0.3\"/>\n\n    \u003c!-- NVDA 顶点节点 (大卡片) -->\n    \u003cg filter=\"url(#cortex-shadow-strong)\">\n      \u003crect x=\"290\" y=\"30\" width=\"180\" height=\"80\" rx=\"12\" fill=\"url(#msNvdaCard)\" stroke=\"var(--green-strong)\" stroke-width=\"2\"/>\n    \u003c/g>\n    \u003ctext x=\"380\" y=\"56\" text-anchor=\"middle\" font-size=\"18\" font-weight=\"800\" fill=\"var(--green-strong)\">NVDA\u003c/text>\n    \u003ctext x=\"380\" y=\"74\" text-anchor=\"middle\" font-size=\"11\" fill=\"var(--text-1)\">L0 客户 · 裁判员\u003c/text>\n    \u003ctext x=\"380\" y=\"89\" text-anchor=\"middle\" font-size=\"10\" fill=\"var(--text-2)\">GPU 毛利 70-75%\u003c/text>\n    \u003ctext x=\"380\" y=\"103\" text-anchor=\"middle\" font-size=\"10\" fill=\"var(--text-2)\">capex +75-100% YoY\u003c/text>\n\n    \u003c!-- NVDA 头顶发光焦点 -->\n    \u003ccircle cx=\"380\" cy=\"20\" r=\"3\" fill=\"white\"/>\n    \u003ccircle cx=\"380\" cy=\"20\" r=\"10\" fill=\"url(#cortex-glow-green)\"/>\n\n    \u003c!-- 分单百分比标注 (从 NVDA 向下分支三条线) -->\n    \u003c!-- 到 SK Hynix -->\n    \u003cpath d=\"M340,110 Q260,145 175,200\" stroke=\"var(--green-strong)\" stroke-width=\"3\" fill=\"none\" marker-end=\"url(#msArrowAccent)\" opacity=\"0.85\"/>\n    \u003ctext x=\"240\" y=\"135\" font-size=\"13\" font-weight=\"800\" fill=\"var(--green-strong)\">65-70%\u003c/text>\n    \u003ctext x=\"240\" y=\"148\" font-size=\"9\" fill=\"var(--text-3)\">HBM4 Rubin\u003c/text>\n\n    \u003c!-- 到 Samsung -->\n    \u003cpath d=\"M380,113 L380,200\" stroke=\"var(--text-3)\" stroke-width=\"1.8\" fill=\"none\" marker-end=\"url(#msArrowAccent)\" stroke-dasharray=\"6,3\"/>\n    \u003ctext x=\"396\" y=\"158\" font-size=\"12\" font-weight=\"700\" fill=\"var(--text-3)\">17-25%\u003c/text>\n    \u003ctext x=\"396\" y=\"171\" font-size=\"9\" fill=\"var(--text-3)\">良率追赶中\u003c/text>\n\n    \u003c!-- 到 MU -->\n    \u003cpath d=\"M420,110 Q500,145 585,200\" stroke=\"var(--amber)\" stroke-width=\"2.5\" fill=\"none\" marker-end=\"url(#msArrowAccent)\" opacity=\"0.85\"/>\n    \u003ctext x=\"510\" y=\"135\" font-size=\"13\" font-weight=\"800\" fill=\"var(--amber)\">10-15%\u003c/text>\n    \u003ctext x=\"510\" y=\"148\" font-size=\"9\" fill=\"var(--text-3)\">份额追赶 21%→25%+\u003c/text>\n\n    \u003c!-- 底部三家 HBM IDM 节点 -->\n    \u003c!-- SK Hynix -->\n    \u003cg filter=\"url(#cortex-shadow-soft)\">\n      \u003crect x=\"70\" y=\"200\" width=\"210\" height=\"100\" rx=\"10\" fill=\"url(#msSKCard)\" stroke=\"var(--green-strong)\" stroke-width=\"1.5\"/>\n    \u003c/g>\n    \u003ctext x=\"175\" y=\"225\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"800\" fill=\"var(--green-strong)\">SK Hynix\u003c/text>\n    \u003ctext x=\"175\" y=\"244\" text-anchor=\"middle\" font-size=\"20\" font-weight=\"800\" fill=\"var(--text-1)\">62%\u003c/text>\n    \u003ctext x=\"175\" y=\"260\" text-anchor=\"middle\" font-size=\"10\" fill=\"var(--text-2)\">HBM 龙头 · MR-MUF 工艺\u003c/text>\n    \u003ctext x=\"175\" y=\"275\" text-anchor=\"middle\" font-size=\"10\" fill=\"var(--text-2)\">Q1 op margin 71.5%\u003c/text>\n    \u003ctext x=\"175\" y=\"290\" text-anchor=\"middle\" font-size=\"9\" fill=\"var(--green-strong)\" font-weight=\"700\">★ ADR 6-7 月上市\u003c/text>\n\n    \u003c!-- Samsung Memory -->\n    \u003cg filter=\"url(#cortex-shadow-soft)\">\n      \u003crect x=\"300\" y=\"200\" width=\"160\" height=\"100\" rx=\"10\" fill=\"url(#msSamsungCard)\" stroke=\"var(--text-3)\" stroke-width=\"1.5\"/>\n    \u003c/g>\n    \u003ctext x=\"380\" y=\"225\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"800\" fill=\"var(--text-2)\">Samsung\u003c/text>\n    \u003ctext x=\"380\" y=\"244\" text-anchor=\"middle\" font-size=\"20\" font-weight=\"800\" fill=\"var(--text-1)\">17%\u003c/text>\n    \u003ctext x=\"380\" y=\"260\" text-anchor=\"middle\" font-size=\"10\" fill=\"var(--text-2)\">HBM3E 通过 NVDA 验证\u003c/text>\n    \u003ctext x=\"380\" y=\"275\" text-anchor=\"middle\" font-size=\"10\" fill=\"var(--text-2)\">HBM4 1c 良率 ~60%\u003c/text>\n    \u003ctext x=\"380\" y=\"290\" text-anchor=\"middle\" font-size=\"9\" fill=\"var(--text-3)\" font-weight=\"700\">Ref（不可投美股）\u003c/text>\n\n    \u003c!-- Micron -->\n    \u003cg filter=\"url(#cortex-shadow-soft)\">\n      \u003crect x=\"480\" y=\"200\" width=\"210\" height=\"100\" rx=\"10\" fill=\"url(#msMUCard)\" stroke=\"var(--amber)\" stroke-width=\"1.5\"/>\n    \u003c/g>\n    \u003ctext x=\"585\" y=\"225\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"800\" fill=\"var(--amber)\">Micron (MU)\u003c/text>\n    \u003ctext x=\"585\" y=\"244\" text-anchor=\"middle\" font-size=\"20\" font-weight=\"800\" fill=\"var(--text-1)\">21%\u003c/text>\n    \u003ctext x=\"585\" y=\"260\" text-anchor=\"middle\" font-size=\"10\" fill=\"var(--text-2)\">美股唯一 · 1γ 节点\u003c/text>\n    \u003ctext x=\"585\" y=\"275\" text-anchor=\"middle\" font-size=\"10\" fill=\"var(--text-2)\">HBM4 11+ Gbps 行业最高\u003c/text>\n    \u003ctext x=\"585\" y=\"290\" text-anchor=\"middle\" font-size=\"9\" fill=\"var(--amber)\" font-weight=\"700\">★ buy_candidate\u003c/text>\n\n    \u003c!-- TSMC CoWoS 卡点节点 (中间位置) -->\n    \u003cg filter=\"url(#cortex-shadow-soft)\">\n      \u003crect x=\"280\" y=\"325\" width=\"200\" height=\"40\" rx=\"6\" fill=\"rgba(184,73,58,0.12)\" stroke=\"var(--red)\" stroke-width=\"1.2\"/>\n    \u003c/g>\n    \u003ctext x=\"380\" y=\"345\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"var(--red)\">L1.5 TSMC CoWoS 卡点\u003c/text>\n    \u003ctext x=\"380\" y=\"358\" text-anchor=\"middle\" font-size=\"9\" fill=\"var(--text-2)\">35K → 130K wpm · sold out 至 2026 · NVDA 锁定 50%+\u003c/text>\n\n    \u003c!-- CoWoS 链接三家 (三条虚线) -->\n    \u003cpath d=\"M175,300 Q235,313 290,338\" stroke=\"var(--red)\" stroke-width=\"0.8\" fill=\"none\" stroke-dasharray=\"3,2\" opacity=\"0.6\"/>\n    \u003cpath d=\"M380,300 L380,325\" stroke=\"var(--red)\" stroke-width=\"0.8\" stroke-dasharray=\"3,2\" opacity=\"0.6\"/>\n    \u003cpath d=\"M585,300 Q525,313 470,338\" stroke=\"var(--red)\" stroke-width=\"0.8\" fill=\"none\" stroke-dasharray=\"3,2\" opacity=\"0.6\"/>\n\n    \u003c!-- 左侧 EAR 隔离墙(向右红色阻断箭头) -->\n    \u003cg>\n      \u003crect x=\"20\" y=\"178\" width=\"42\" height=\"144\" fill=\"rgba(184,73,58,0.10)\" stroke=\"var(--red)\" stroke-width=\"1\" stroke-dasharray=\"4,3\"/>\n      \u003ctext x=\"41\" y=\"200\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"700\" fill=\"var(--red)\">EAR\u003c/text>\n      \u003ctext x=\"41\" y=\"213\" text-anchor=\"middle\" font-size=\"8\" fill=\"var(--red)\">ECCN\u003c/text>\n      \u003ctext x=\"41\" y=\"225\" text-anchor=\"middle\" font-size=\"8\" fill=\"var(--red)\">3A090.c\u003c/text>\n      \u003ctext x=\"41\" y=\"250\" text-anchor=\"middle\" font-size=\"  stroke-dasharray=\"2,2\"/>\n\n    \u003c!-- 15. SK Q2 财报 ★ -->\n    \u003cg filter=\"url(#cortex-shadow-soft)\">\n      \u003crect x=\"260\" y=\"360\" width=\"125\" height=\"36\" rx=\"6\" fill=\"url(#msCatStar1)\" stroke=\"var(--accent)\" stroke-width=\"1\"/>\n    \u003c/g>\n    \u003ctext x=\"270\" y=\"376\" font-size=\"9\" font-weight=\"700\" fill=\"var(--accent)\">★ SK Q2 财报\u003c/text>\n    \u003ctext x=\"270\" y=\"389\" font-size=\"8\" fill=\"var(--text-2)\">维持 op 71.5%+\u003c/text>\n\n    \u003c!-- 底部图例 -->\n    \u003cg transform=\"translate(20,420)\">\n      \u003ctext x=\"0\" y=\"0\" font-size=\"10\" font-weight=\"700\" fill=\"var(--text-2)\">重要性图例：\u003c/text>\n      \u003crect x=\"100\" y=\"-8\" width=\"14\" height=\"12\" rx=\"2\" fill=\"url(#msCatStar3)\" stroke=\"var(--green-strong)\" stroke-width=\"1.5\"/>\n      \u003ctext x=\"120\" y=\"2\" font-size=\"10\" fill=\"var(--text-1)\">★★★ binary IPO 级\u003c/text>\n      \u003crect x=\"245\" y=\"-8\" width=\"14\" height=\"12\" rx=\"2\" fill=\"url(#msCatStar2)\" stroke=\"var(--amber)\" stroke-width=\"1.5\"/>\n      \u003ctext x=\"265\" y=\"2\" font-size=\"10\" fill=\"var(--text-1)\">★★ 关键二阶催化\u003c/text>\n      \u003crect x=\"385\" y=\"-8\" width=\"14\" height=\"12\" rx=\"2\" fill=\"url(#msCatStar1)\" stroke=\"var(--accent)\" stroke-width=\"1.5\"/>\n      \u003ctext x=\"405\" y=\"2\" font-size=\"10\" fill=\"var(--text-1)\">★ 常规节奏验证\u003c/text>\n    \u003c/g>\n    \u003ctext x=\"20\" y=\"445\" font-size=\"9\" fill=\"var(--text-3)\" font-style=\"italic\">最危险信号: hyperscaler 季度 capex 连续 2 季度 &lt;+20% YoY → MS-RB1/RB5 失效退整赛道\u003c/text>\n  \u003c/svg>\n\u003c/div>\n"}, {"type": "risk-impact-matrix-svg", "title": "风险概率 × 影响矩阵——10 项系统性风险（monitor support）", "section": "monitor", "body": "\u003cdiv class=\"cortex-module-risk-impact-matrix-svg\" style=\"background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;\">\n  \u003cdiv style=\"font-size:var(--fs-body);color:var(--text-3) // Action badge
function actionBadge(action) {
  if (!action) return '';
  var a = String(action);
  var aLow = a.toLowerCase();
  var cls = 'b-gr';
  if (aLow.includes('买入') || aLow.includes('buy') || aLow.includes('加仓')) cls = 'b-g';
  else if (aLow.includes('观望') || aLow.includes('hold') || aLow.includes('wait')) cls = 'b-y';
  else if (aLow.includes('回避') || aLow.includes('sell') || aLow.includes('avoid') || aLow.includes('减仓')) cls = 'b-r';
  return '<span class="b ' + cls + '">' + e(a) + '</span>';
}

// Format probability — avoids double-% (e.g. "30%" + "%" → "30%%")
function fmtProb(v) {
  if (v == null || v === '') return '\u2014';
  var s = String(v).trim();
  if (s.endsWith('%')) return s;
  var n = Number(s);
  if (!isNaN(n)) return n + '%';
  return s; // "高/中/低" etc.
}

// Heatmap class for score 1-5
function hmClass(val) {
  var n = parseInt(val);
  if (n >= 5) return 'hm-5';
  if (n === 4) return 'hm-4';
  if (n === 3) return 'hm-3';
  if (n === 2) return 'hm-2';
  if (n <= 1) return 'hm-1';
  return '';
}

// Scenario cell class
function scenarioClass(text) {
  var t = String(text || '');
  if (t.includes('\u2705')) return 'scenario-green';
  if (t.includes('\u26A0')) return 'scenario-yellow';
  if (t.includes('\u274C')) return 'scenario-red';
  return '';
}

// Probability color
function probColor(prob) {
  var p = parseFloat(prob);
  if (isNaN(p)) {
    var s = String(prob || '').toLowerCase();
    if (s.includes('high') || s.includes('\u9AD8')) return 'var(--red)';
    if (s.includes('med') || s.includes('\u4E2D')) return 'var(--yellow)';
    return 'var(--green)';
  }
  if (p > 30) return 'var(--red)';
  if (p >= 15) return 'var(--yellow)';
  return 'var(--green)';
}

// Parse valuation range "bear $X / base $Y / bull $Z"
function parseValRange(str) {
  if (!str) return null;
  var parts = String(str).split('/').map(function(s) { return s.trim(); });
  var result = {};
  for (var i = 0; i < parts.length; i++) {
    var p = parts[i];
    var m = p.match(/(bear|base|bull|low|mid|high)[\s:]*\$?([\d,.]+)/i);
    if (m) {
      var key = m[1].toLowerCase();
      if (key === 'low') key = 'bear';
      if (key === 'mid') key = 'base';
      if (key === 'high') key = 'bull';
      result[key] = parseFloat(m[2].replace(/,/g, ''));
    }
  }
  if (result.bear !== undefined || result.base !== undefined || result.bull !== undefined) return result;
  return null;
}

        h += '<span class="b b-g" style="font-size:11px;padding:2px 6px">' + e(deps[dpi]) + '</span>';
      }
      h += '</td>';
    } else {
      h += '<td style="color:var(--text3)">\u2014</td>';
    }
    h += '</tr>';
  }
  h += '</tbody></table></div></div>';
}

// 4. Scenario Matrix (supports both {paths:[...], expected_return} and flat array)
var smPaths = Array.isArray(D.scenario_matrix) ? D.scenario_matrix : (D.scenario_matrix && D.scenario_matrix.paths ? D.scenario_matrix.paths : []);
var smExpRet = D.scenario_matrix && D.scenario_matrix.expected_return ? D.scenario_matrix.expected_return : '';
if (smPaths.length) {
  h += '<div class="panel"><div class="panel-title"><span style="margin-right:6px;color:var(--accent)">\u229E</span>\u60C5\u666F\u77E9\u9635</div>';
  h += '<div class="table-wrap"><table class="data-tbl" style="min-width:600px"><thead><tr>';
  h += '<th>\u8DEF\u5F84</th><th>\u6982\u7387</th><th>\u63CF\u8FF0</th><th>\u5F71\u54CD</th><th>\u7EC4\u5408\u56DE\u62A5</th>';
  h += '</tr></thead><tbody>';
  for (var sci2 = 0; sci2 < smPaths.length; sci2++) {
    var scenario = smPaths[sci2];
    var pColor = probColor(scenario.probability);
    h += '<tr>';
    h += '<td style="font-weight:700;color:var(--text)">' + md(scenario.path) + '</td>';
    h += '<td class="mono" style="color:' + pColor + ';font-weight:700">' + e(fmtProb(scenario.probability)) + '</td>';
    h += '<td style="color:var(--text2);font-size:12px">' + md(scenario.description || '\u2014') + '</td>';
    h += '<td style="color:var(--text2);font-size:12px">' + md(scenario.impact || '\u2014') + '</td>';
    h += '<td class="mono" style="color:var(--green);font-weight:600">' + e(scenario.portfolio_return || '\u2014') + '</td>';
    h += '</tr>';
  }
  if (smExpRet) {
    h += '<tr style="border-top:2px solid rgba(0,0,0,.10)"><td colspan="4" style="font-weight:700;color:var(--text);text-align:right">\u671F\u671B\u56DE\u62A5</td>';
    h += '<td class="mono" style="font-weight:700;color:var(--green);font-size:16px">' + e(smExpRet) + '</td></tr>';
  }
  h += '</tbody></table></div></div>';
}

// 5. Edge Conclusion
if (D.edge_conclusion) {
  h += '<div class="quote-block" style="border-color:var(--green);margin-top:6px">' + renderBlock(D.edge_conclusion) + '</div>';
}

// 6. Contrarian
if ((D.contrarian || []).length) {
  h += '<div class="panel" style="border-left:4px solid var(--red)"><div class="panel-title" style="color:var(--red)"><span style="margin-right:6px">\u26A0</span>\u53CD\u5411\u8BBA\u8BC1</div>';
  h += '<div class="panel-body">';
  for (var cti = 0; cti < D.contrarian.length; cti++) {
    var ct = D.contrarian[cti];
    var ctReason = typeof ct === 'string' ? ct : (ct.reason || '');
    var ctProb = typeof ct === 'object' ? ct.probability : '';
    var ctImpact = typeof ct === 'object' ? ct.impact : '';
    h += '<div style="padding:8px 12px;background:rgba(211,31,31,.06);border:1px solid rgba(211,31,31,.15);border-radius:8px;display:flex;gap:12px;align-items:flex-start">';
    if (ctProb) h += '<span class="mono" style="color:var(--red);font-weight:700;font-size:12px;flex-shrink:0;min-width:32px">' + e(fmtProb(ctProb)) + '</span>';
    h += '<div style="flex:1;min-width:0">';
    h += '<div style="font-size:12px;font-weight:600;color:var(--red);line-height:1.5">' + md(ctReason) + '</div>';
    if (ctImpact) h += '<div style="font-size:12px;color:var(--text3);margin-top:3px;line-height:1.5">\u2192 ' + md(ctImpact) + '</div>';
    h += '</div></div>';
  }
  h += '</div></div>';
}

// extensions: assets
h += '<div class="extensions-host" data-tab="assets"></div>';

h += '</div>'; // section-stack
h += '</div>'; // end assets

// ========== TAB SENTINEL: 认知（河流图 + Hover Tooltip + Click Drawer） ==========
// 渲染逻辑见 assets/sentinel-page.js · window.renderSentinel(data, host)
h += '<div id="sentinel" class="page-panel"><div id="sentinel-host"></div></div>';

// ========== TAB 4: MONITOR ==========
h += '<div id="monitor" class="page-panel">';

// Status legend
h += '<div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em">';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot confirmed" style="width:8px;height:8px"></span>\u5DF2\u9A8C\u8BC1</span>';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot strong" style="width:8px;height:8px"></span>\u8D8B\u52BF\u5411\u597D</span>';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot approaching" style="width:8px;height:8px"></span>\u63A5\u8FD1\u89E6\u53D1</span>';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot watching" style="width:8px;height:8px"></span>\u89C2\u5BDF\u4E2D</span>';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot weakening" style="width:8px;height:8px"></span>\u8F6C\u5F31</span>';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot failing" style="width:8px;height:8px"></span>\u8BC1\u4F2A</span>';
h += '</div>';

h += '<div class="section-stack">';

// 1. Tipping Points Table
if (allTippingPoints.length) {
  h += '<div class="panel"><div class="panel-title"><span style="margin-right:6px;color:var(--accent)">\u25C9</span>\u62D0\u70B9\u76D1\u63A7</div>';
  h += '<div class="table-wrap"><table class="data-tbl" style="min-width:780px"><thead><tr>';
  h += '<th>\u62D0\u70B9</th><th>\u5F53\u524D</th><th>\u9608\u503C</th><th>\u5047\u8BBE</th><th>\u6743\u91CD</th><th>\u6570\u636E\u6E90</th><th>\u72B6\u6001</th>';
  h += '</tr></thead><tbody>';
  for (var tpi = 0; tpi < allTippingPoints.length; tpi++) {
    var ip = allTippingPoints[tpi];
    var state = ipState(ip);
    var dotHtml = '<span class="tp-dot ' + state + '" style="width:8px;height:8px;margin-right:6px"></span>';
    var ds = ip.data_source || '';
    var isUrl = /^https?:\/\//.test(ds);
    var dsHtml = isUrl
      ? '<a href="' + e(ds) + '" target="_blank" rel="noopener noreferrer" style="color:var(--purple);font-size:11px">' + e(ds.replace(/^https?:\/\/(www\.)?/, '').split('/').slice(0, 2).join('/')) + '</a>'
      : '<span style="color:var(--text3);font-size:11px">' + e(ds || '\u2014') + '</span>';
    h += '<tr>';
    h += '<td style="font-weight:600">' + e(ip.event) + '</td>';
    h += '<td class="mono" style="color:var(--green-strong)">' + e(ip.current || '\u2014') + '</td>';
    h += '<td>' + e(ip.quantitative || ip.qualitative || '\u2014') + '</td>';
    h += '<td style="color:var(--green);white-space:nowrap">' + (ip.hypothesis_id ? e(ip.hypothesis_id) : '\u2014') + '</td>';
    h += '<td class="mono">' + e(ip.weight || '\u2014') + '</td>';
    h += '<td>' + dsHtml + '</td>';
    h += '<td style="white-space:nowrap">' + dotHtml + statusCn(state) + '</td>';
    h += '</tr>';
  }
  h += '</tbody></table></div></div>';
}

// 2. Catalysts Timeline
if ((D.catalysts || []).length) {
  h += '<div class="panel"><div class="panel-title"><span style="margin-right:6px;color:var(--accent)">\u25B6</span>\u50AC\u5316\u5242\u65F6\u95F4\u7EBF</div>';
  h += '<div class="timeline">';
  var sortedCatalysts = D.catalysts.slice().sort(function(a, b) {
    return (a.date || '') < (b.date || '') ? -1 : (a.date || '') > (b.date || '') ? 1 : 0;
  });
  for (var cai = 0; cai < sortedCatalysts.length; cai++) {
    var cat = sortedCatalysts[cai];
    h += '<div class="tl-item">';
    h += '<span class="tl-date">' + e(cat.date) + '</span>';
    h += '<div class="tl-content">';
    h += '<div style="font-weight:600;color:var(--text)">' + md(cat.event) + '</div>';
    if (cat.targets) {
      var assetList = Array.isArray(cat.targets) ? cat.targets : String(cat.targets).split(',').map(function(s) { return s.trim(); });
      h += '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">';
      for (var ali = 0; ali < assetList.length; ali++) {
        h += '<span class="b b-g" style="font-size:11px;padding:3px 8px">' + e(assetList[ali]) + '</span>';
      }
      h += '</div>';
    }
    if (cat.expected_impact) h += '<div style="font-size:12px;color:var(--text3);margin-top:4px">' + md(cat.expected_impact) + '</div>';
    h += '</div></div>';
  }
  h += '</div></div>';
}

// 3. Risks Table
if ((D.risks || []).length) {
  h += '<div class="panel"><div class="panel-title"><span style="margin-right:6px;color:var(--red)">\u26A0</span>\u98CE\u9669\u8BC4\u4F30</div>';
  h += '<div class="table-wrap"><table class="data-tbl" style="min-width:700px"><thead><tr>';
  h += '<th>\u98CE\u9669</th><th>\u6982\u7387</th><th>\u5F71\u54CD</th><th>\u6CE2\u53CA\u6807\u7684</th><th>\u5BF9\u51B2</th>';
  h += '</tr></thead><tbody>';
  for (var rki = 0; rki < D.risks.length; rki++) {
    var risk = D.risks[rki];
    var pColor = probColor(risk.probability);
    h += '<tr>';
    h += '<td style="font-weight:600;color:var(--text)">' + md(risk.risk) + '</td>';
    h += '<td class="mono" style="color:' + pColor + ';font-weight:700">' + e(fmtProb(risk.probability)) + '</td>';
    h += '<td style="color:var(--text2)">' + md(risk.impact || '\u2014') + '</td>';
    if (risk.most_impacted) {
      var affList = Array.isArray(risk.most_impacted) ? risk.most_impacted : String(risk.most_impacted).split(',').map(function(s) { return s.trim(); });
      h += '<td>';
      for (var afi = 0; afi < affList.length; afi++) {
        h += '<span class="b b-o" style="font-size:11px;padding:3px 8px;margin:2px">' + e(affList[afi]) + '</span>';
      }
      h += '</td>';
    } else {
      h += '<td style="color:var(--text3)">\u2014</td>';
    }
    h += '<td style="font-size:12px;color:var(--text2)">' + md(risk.hedge || '\u2014') + '</td>';
    h += '</tr>';
  }
  h += '</tbody></table></div></div>';
}

// 4. Evolution Timeline
if ((D.evolution || []).length) {
  h += '<div class="panel"><div class="panel-title"><span style="margin-right:6px;color:var(--accent)">\u2192</span>\u957F\u671F\u6F14\u53D8</div>';
  h += '<div class="timeline">';
  for (var evi = 0; evi < D.evolution.length; evi++) {
    var ev = D.evolution[evi];
    h += '<div class="tl-item">';
    h += '<span class="tl-date">' + e(ev.period) + '</span>';
    h += '<div class="tl-content">';
    h += '<div style="font-weight:600;color:var(--text)">' + md(ev.event) + '</div>';
    h += '<div style="display:flex;gap:10px;margin-top:4px;font-size:12px">';
    if (ev.probability) h += '<span class="mono" style="color:var(--text3)">\u6982\u7387: ' + e(ev.probability) + '</span>';
    if (ev.investment_impact) h += '<span style="color:var(--text2)">\u5F71\u54CD: ' + md(ev.investment_impact) + '</span>';
    h += '</div>';
    h += '</div></div>';
  }
  h += '</div></div>';
}

// 4b. Terminal State
if (D.terminal_state) {
  h += '<div class="panel"><div class="panel-title"><span style="margin-right:6px;color:var(--accent)">\u25CE</span>\u7EC8\u6001\u5224\u65AD</div>';
  h += '<div class="panel-body"><div style="font-size:12px;color:var(--text2)">' + renderBlock(D.terminal_state) + '</div></div></div>';
}

// 5. Exit Framework — removed (internal module)
// 6. Discussion Notes — removed (internal module)

// extensions: monitor
h += '<div class="extensions-host" data-tab="monitor"></div>';

h += '</div>'; // section-stack
h += '</div>'; // end monitor

// Inject into DOM
$('app').innerHTML = h;
document.title = (D.title || 'Sector') + ' \u2014 Cortex';

// Render sentinel tab via assets/sentinel-page.js
if (D.sentinel && D.sentinel.namespace) {
  window.renderSentinel(D.sentinel, '#sentinel-host');
}

// Render extensions (\u7075\u6d3b\u5b57\u6bb5) \u2014 \u6309 section \u6ce8\u5165\u5230\u5bf9\u5e94 tab \u7684 extensions-host \u5bb9\u5668
// sector-writer \u4ece s6_report \u7684\u81ea\u7531 fence (svg-portal / html-portal / yaml-portal-extension) \u6536\u96c6
// \u6e32\u67d3\u89c4\u5219\uff1aexperimental-{slug} \u8d70 body \u76f4\u51fa\uff1b\u6b63\u5f0f module (\u6709\u5bf9\u5e94 modules/{type}/template.html) \u8d70 data + template (Phase 5 \u6c89\u6dc0\u540e\u542f\u7528)
if (Array.isArray(D.extensions) && D.extensions.length) {
  // v6: hero visual (type \u4ee5 `hero-` \u5f00\u5934 OR `-svg` \u7ed3\u5c3e) \u7f6e\u9876 + \u5360\u5168\u5bbd
  var heroExts = [], supportExts = [];
  for (var exi0 = 0; exi0 < D.extensions.length; exi0++) {
    var ext0 = D.extensions[exi0];
    if (!ext0 || !ext0.section || ext0.section === 'sentinel') continue;
    var t = String(ext0.type || '');
    var isHero = /^hero-/.test(t) || /-svg$/.test(t);
    (isHero ? heroExts : supportExts).push(ext0);
  }
  // \u5148\u6ce8\u5165 hero\uff08\u5360\u9876\u90e8\uff09\uff0c\u540e\u6ce8\u5165 support
  function injectExt(ext, isHero) {
    var hostEl = document.querySelector('.extensions-host[data-tab="' + ext.section + '"]');
    if (!hostEl) return;
    var slug = String(ext.type || 'experimental-unnamed').replace(/^experimental-/, '').replace(/[^a-z0-9\-_]/gi, '');
    var cardClass = isHero ? 'extension-card hero-card cortex-module-' + slug : 'extension-card cortex-module-' + slug;
    var cardStyle = isHero
      ? 'margin:0 0 18px 0;padding:18px;background:var(--bg-1);border:1px solid var(--border);border-radius:10px;box-shadow:0 1px 3px rgba(18,20,27,0.04);width:100%'
      : 'margin:12px 0;box-shadow:0 1px 2px rgba(18,20,27,0.02)';
    var card = '<div class="' + cardClass + '" style="' + cardStyle + '">';
    if (ext.title) {
      var titleStyle = isHero
        ? 'font-size:13px;color:var(--text-2);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px'
        : 'font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px';
      card += '<div class="extension-title" style="' + titleStyle + '">' + e(ext.title) + '</div>';
    }
    if (ext.body) {
      card += '<div class="extension-body">' + ext.body + '</div>';
    } else if (ext.data) {
      card += '<div class="extension-data" style="padding:8px;background:rgba(0,0,0,.03);border-radius:6px;font-size:11px;color:var(--text3)"><em>structured data (\u5f85 module template \u6e32\u67d3):</em><pre style="margin:4px 0 0 0;font-size:11px;overflow-x:auto">' + JSON.stringify(ext.data, null, 2) + '</pre></div>';
    }
    card += '</div>';
    // hero \u7528 prepend (\u9876\u90e8) / support \u7528 append (\u5e95\u90e8)
    if (isHero) {
      hostEl.insertAdjacentHTML('afterbegin', card);
    } else {
      hostEl.insertAdjacentHTML('beforeend', card);
    }
  }
  // \u5148\u6ce8\u5165 support\uff08\u6309\u987a\u5e8f beforeend\uff09\uff0c\u518d\u6ce8\u5165 hero\uff08afterbegin \u63a8\u5230\u9876\u90e8\uff09
  supportExts.forEach(function(e) { injectExt(e, false); });
  heroExts.forEach(function(e) { injectExt(e, true); });
}

</script>
</body>
</html>
