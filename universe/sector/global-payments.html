<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cortex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09100d;
  --bg2: #111916;
  --bg3: #17211d;
  --bg4: #203029;
  --bg-soft: #0d1512;
  --panel: rgba(20, 31, 27, .92);
  --border: rgba(112, 143, 128, .22);
  --border-strong: rgba(141, 180, 160, .38);
  --border-w: 1px;
  --radius: 18px;
  --radius-sm: 12px;
  --shadow: 0 22px 48px rgba(0, 0, 0, .34);
  --shadow-sm: 0 12px 28px rgba(0, 0, 0, .24);
  --text: #edf4ee;
  --text2: #bcc9c0;
  --text3: #789082;
  --red: #d44a32;
  --blue: #4d8dff;
  --yellow: #d8b85e;
  --green: #52c78c;
  --green-strong: #7de2a9;
  --green-soft: rgba(82, 199, 140, .12);
  --orange: #d69552;
  --purple: #b39bff;
  --cyan: #22d3ee;
  --white: #FFFFFF;
  --font: 'Outfit', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --mono: 'IBM Plex Mono', 'SF Mono', 'Menlo', 'Consolas', monospace;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family:var(--font);
  background:
    radial-gradient(circle at top left, rgba(82,199,140,.1), transparent 28%),
    radial-gradient(circle at top right, rgba(216,184,94,.06), transparent 24%),
    linear-gradient(180deg, #0b120f 0%, var(--bg) 100%);
  color:var(--text);
  font-size:15px;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
}
a { color:var(--green-strong); text-decoration:none; }
a:hover { text-decoration:underline; }
.mono { font-family:var(--mono); }

.dashboard { max-width:1280px; margin:0 auto; padding:24px 24px 48px; }

/* Header */
.header {
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  padding:0 0 14px;
  border-bottom:1px solid var(--border);
  margin-bottom:14px;
  flex-wrap:wrap;
  gap:20px;
}
.header h1 {
  font-size:clamp(26px, 4vw, 36px);
  font-weight:700;
  line-height:.94;
  letter-spacing:-.03em;
  text-transform:uppercase;
  color:var(--white);
}
.header-sub {
  font-size:11px;
  color:var(--text3);
  margin-top:6px;
  text-transform:uppercase;
  letter-spacing:.18em;
  font-weight:700;
}
.header-right { display:flex; align-items:flex-end; gap:12px; flex-wrap:wrap; justify-content:flex-end; }

/* Rating circle */
.rating-circle {
  width:40px; height:40px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:900; font-family:var(--mono);
  border:3px solid;
}

/* Badges */
.b {
  font-size:9px;
  padding:4px 8px;
  border-radius:999px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.12em;
  display:inline-flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
  border:1px solid transparent;
}
.b::before { display:none; }
.b-g { background:rgba(82,199,140,.16); color:var(--green-strong); border-color:rgba(82,199,140,.28); }
.b-y { background:rgba(216,184,94,.14); color:var(--yellow); border-color:rgba(216,184,94,.24); }
.b-r { background:rgba(212,74,50,.14); color:#ef8f7d; border-color:rgba(212,74,50,.24); }
.b-b { background:rgba(77,141,255,.14); color:#9db8ff; border-color:rgba(77,141,255,.24); }
.b-p { background:rgba(179,155,255,.14); color:#c8b8ff; border-color:rgba(179,155,255,.22); }
.b-o { background:rgba(214,149,82,.14); color:#ebb175; border-color:rgba(214,149,82,.24); }
.b-gr { background:rgba(120,144,130,.12); color:var(--text3); border-color:rgba(120,144,130,.18); }

/* Tabs */
.tabs {
  display:flex;
  gap:12px;
  margin-bottom:14px;
  flex-wrap:wrap;
}
.tab {
  padding:8px 14px;
  font-family:var(--font);
  font-size:11px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.14em;
  color:var(--text3);
  background:rgba(19, 28, 24, .82);
  border:var(--border-w) solid var(--border);
  border-radius:999px;
  box-shadow:none;
  cursor:pointer;
  transition:all .18s ease;
  position:relative;
  backdrop-filter:blur(8px);
}
.tab:hover { color:var(--text); border-color:rgba(125,226,169,.34); background:rgba(24, 35, 30, .95); }
.tab.active { color:var(--bg); background:linear-gradient(135deg, var(--green-strong), var(--green)); border-color:transparent; box-shadow:0 10px 24px rgba(82,199,140,.22); }

/* Page toggle */
.page-panel { display:none; }
.page-panel.active { display:block; }

/* Section stack */
.section-stack { display:flex; flex-direction:column; gap:10px; }

/* Cards */
.card {
  background:linear-gradient(180deg, rgba(22, 33, 29, .96), rgba(15, 24, 20, .96));
  border:var(--border-w) solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:14px 16px 12px;
  position:relative;
  overflow:hidden;
}
.card::before {
  content:'';
  position:absolute;
  inset:0;
  border-radius:inherit;
  pointer-events:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.card-title {
  font-size:11px;
  font-weight:800;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:.16em;
  margin-bottom:8px;
}
.card-body { display:flex; flex-direction:column; gap:8px; }
.split-grid { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:10px; }

/* Eyebrow */
.eyebrow {
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:10px;
  color:var(--green-strong);
  text-transform:uppercase;
  letter-spacing:.16em;
  font-weight:900;
  margin-bottom:6px;
}
.eyebrow::before { content:''; width:18px; height:2px; background:var(--green); }

/* Quote block */
.quote-block {
  border-left:4px solid var(--green);
  padding:12px 16px;
  font-size:14px;
  line-height:1.75;
  color:var(--text);
  background:rgba(82,199,140,.04);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
}

/* Key metric grid */
.km-grid { display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:2px; }
.km-item { background:rgba(255,255,255,.03); padding:10px 12px; }
.km-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.12em; font-weight:800; }
.km-value { font-family:var(--mono); font-weight:700; font-size:14px; color:var(--text); margin-top:6px; }
.km-note { font-size:11px; color:var(--text3); margin-top:4px; }

/* Collapsible */
.collapsible { background:linear-gradient(180deg, rgba(22, 33, 29, .96), rgba(15, 24, 20, .96)); border:var(--border-w) solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow-sm); }
.collapsible-head {
  padding:10px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  user-select:none;
}
.collapsible-head:hover { background:rgba(255,255,255,.02); }
.collapsible-body { padding:0 16px 14px; display:none; }
.collapsible.open .collapsible-body { display:block; }
.collapsible-title { font-size:15px; font-weight:800; color:var(--text); }
.arrow { font-size:14px; color:var(--text3); transition:transform .2s; }
.collapsible.open .arrow { transform:rotate(180deg); }

/* Tipping point dot */
.tp-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; border:2px solid; transition:all .2s; display:inline-block; vertical-align:middle; }
.tp-dot.watching { background:transparent; border-color:var(--text3); }
.tp-dot.weakening { background:rgba(208,32,32,.3); border-color:var(--red); }
.tp-dot.approaching { background:var(--yellow); border-color:var(--yellow); box-shadow:0 0 0 3px rgba(216,184,94,.14); }
.tp-dot.strong { background:rgba(82,199,140,.5); border-color:var(--green); box-shadow:0 0 0 3px rgba(82,199,140,.14); }
.tp-dot.confirmed { background:var(--green); border-color:var(--green); box-shadow:0 0 6px rgba(82,199,140,.4); position:relative; }
.tp-dot.confirmed::after { content:'\2713'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:7px; color:#000; font-weight:700; }
.tp-dot.failing { background:var(--red); border-color:var(--red); box-shadow:0 0 6px rgba(208,32,32,.4); }

/* Table */
.table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:16px; background:rgba(12, 20, 17, .92); }
.data-tbl { width:100%; border-collapse:collapse; font-size:12px; min-width:680px; }
.data-tbl th, .data-tbl td { padding:8px 10px; text-align:left; border-bottom:1px solid rgba(255,255,255,.06); vertical-align:top; }
.data-tbl th {
  font-size:10px;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:.16em;
  font-weight:900;
  background:rgba(255,255,255,.025);
}
.data-tbl tbody tr:hover { background:rgba(82,199,140,.04); }

/* Timeline */
.timeline { position:relative; display:flex; flex-direction:column; gap:8px; padding-left:22px; }
.timeline::before { content:''; position:absolute; left:4px; top:6px; bottom:6px; width:2px; background:linear-gradient(180deg, rgba(125,226,169,.8), rgba(82,199,140,.18)); }
.tl-item { display:flex; gap:14px; padding-left:20px; position:relative; font-size:13px; }
.tl-item::before {
  content:'';
  position:absolute;
  left:-1px;
  top:6px;
  width:10px;
  height:10px;
  border:2px solid var(--green);
  background:var(--bg-soft);
  border-radius:50%;
}
.tl-date { color:var(--text3); min-width:80px; font-family:var(--mono); font-size:12px; flex-shrink:0; }
.tl-content { color:var(--text2); flex:1; }

/* Asset quick card row */
.asset-scroll { display:flex; gap:16px; overflow-x:auto; padding:4px 0 12px; }
.asset-qcard {
  flex:0 0 180px;
  padding:12px;
  background:linear-gradient(180deg, rgba(22, 33, 29, .96), rgba(15, 24, 20, .96));
  border:var(--border-w) solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
}
.asset-qcard-symbol { font-size:16px; font-weight:900; font-family:var(--mono); letter-spacing:-.02em; }
.asset-qcard-action { margin-top:8px; }
.asset-qcard-meta { margin-top:10px; font-size:11px; color:var(--text3); line-height:1.7; }

/* TAM bars */
.tam-bar-wrap { display:flex; flex-direction:column; gap:10px; }
.tam-bar-row { display:flex; align-items:center; gap:12px; }
.tam-bar-label { min-width:50px; font-size:12px; font-weight:700; color:var(--text2); text-align:right; }
.tam-bar { height:22px; border-radius:6px; display:flex; align-items:center; padding:0 12px; font-size:12px; font-family:var(--mono); font-weight:600; transition:width .3s ease; min-width:60px; }

/* Tier colors */
.tier-t1 { border-left:4px solid var(--green); }
.tier-t2 { border-left:4px solid var(--blue); }
.tier-t3 { border-left:4px solid var(--yellow); }
.tier-t4 { border-left:4px solid var(--red); }

/* Heatmap cell */
.heatmap-cell { font-family:var(--mono); font-weight:700; font-size:14px; text-align:center; padding:8px 12px; border-radius:6px; }
.hm-5 { background:rgba(82,199,140,.22); color:var(--green-strong); }
.hm-4 { background:rgba(82,199,140,.12); color:var(--green); }
.hm-3 { background:rgba(216,184,94,.14); color:var(--yellow); }
.hm-2 { background:rgba(214,149,82,.14); color:var(--orange); }
.hm-1 { background:rgba(212,74,50,.14); color:#ef8f7d; }

/* Scenario matrix cells */
.scenario-green { background:rgba(82,199,140,.1); }
.scenario-yellow { background:rgba(216,184,94,.08); }
.scenario-red { background:rgba(212,74,50,.08); }

/* Note card */
.note-card {
  padding:12px;
  border:1px solid var(--border);
  border-radius:16px;
  background:rgba(21, 31, 27, .88);
  box-shadow:var(--shadow-sm);
}
.note-card-date { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.14em; font-weight:900; margin-bottom:6px; }

/* Responsive */
@media (max-width:1080px) {
  .split-grid { grid-template-columns:1fr; }
  .km-grid { grid-template-columns:repeat(2, minmax(0,1fr)); }
}
@media (max-width:768px) {
  .dashboard { padding:20px 16px 56px; }
  .header { align-items:flex-start; }
  .header h1 { max-width:none; }
  .header-right { justify-content:flex-start; }
  .km-grid { grid-template-columns:repeat(2, minmax(0,1fr)); }
  .tabs { overflow-x:auto; flex-wrap:nowrap; padding-bottom:8px; }
  .tab { flex:0 0 auto; }
}
</style>

// Rich text block renderer: handles \n, bullet lists (- ), numbered context
function renderBlock(s) {
  if (!s) return '';
  var lines = String(s).split('\n');
  var out = '';
  var inList = false;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) { if (inList) { out += '</ul>'; inList = false; } continue; }
    if (line.match(/^[-•]\s/)) {
      if (!inList) { out += '<ul style="margin:4px 0;padding-left:18px;line-height:1.7">'; inList = true; }
      out += '<li style="margin:2px 0">' + md(line.replace(/^[-•]\s*/, '')) + '</li>';
    } else {
      if (inList) { out += '</ul>'; inList = false; }
      out += '<p style="margin:4px 0;line-height:1.7">' + md(line) + '</p>';
    }
  }
  if (inList) out += '</ul>';
  return out;
}

// Semicolon/Chinese-semicolon separated string → bullet list
function renderList(s) {
  if (!s) return '';
  var items = String(s).split(/[;；]/).map(function(x) { return x.trim(); }).filter(Boolean);
  if (items.length <= 1) return '<div style="line-height:1.7">' + md(s) + '</div>';
  var out = '<ul style="margin:0;padding-left:16px;line-height:1.8">';
  for (var i = 0; i < items.length; i++) {
    out += '<li style="margin:2px 0;color:var(--text2)">' + md(items[i]) + '</li>';
  }
  return out + '</ul>';
}

function probColor(prob) {
  var p = parseFloat(prob);
  if (isNaN(p)) {

    if (s.includes('high') || s.includes('\u9AD8')) return 'var(--red)';
    if (s.includes('med') || s.includes('\u4E2D')) return 'var(--yellow)';

  return 'var(--green)';
}

// Parse valuation range "bear $X / base $Y / bull $Z"
function parseValRange(str) {
  if (!str) return null;
  var parts = String(str).split('/').map(function(s) { return s.trim(); });
  var result = {};
  for (var i = 0; i < parts.length; i++) {
    var p = parts[i];
    var m = p.match(/(bear|base|bull|low|mid|high)[\s:]*\$?([\d,.]+)/i);
    if (m) {
      var key = m[1].toLowerCase();
      if (key === 'low') key = 'bear';
      if (key === 'mid') key = 'base';
      if (key === 'high') key = 'bull';
      result[key] = parseFloat(m[2].replace(/,/g, ''));
    }
  }
  if (result.bear !== undefined || result.base !== undefined || result.bull !== undefined) return result;
  return null;
}

      // Parse and color-code bear/base/bull
      var vrParts = String(aj2.valuation_range).split('/').map(function(s) { return s.trim(); });
      h += '<td class="mono" style="font-size:12px;white-space:nowrap">';
      for (var vpi = 0; vpi < vrParts.length; vpi++) {
        var vp = vrParts[vpi];
        var vpColor = 'var(--text2)';
        if (vp.toLowerCase().indexOf('bear') >= 0) vpColor = 'var(--red)';
        else if (vp.toLowerCase().indexOf('base') >= 0) vpColor = 'var(--text)';
        else if (vp.toLowerCase().indexOf('bull') >= 0) vpColor = 'var(--green)';
        if (vpi > 0) h += ' <span style="color:var(--text3)">/</span> ';
        h += '<span style="color:' + vpColor + '">' + e(vp) + '</span>';
      }
      h += '</td>';
    } else {
      h += '<td style="color:var(--text3)">\u2014</td>';
    }
    if (aj2.depends_on && aj2.depends_on.length) {
      h += '<td style="font-size:11px">';
      for (var dpi = 0; dpi < aj2.depends_on.length; dpi++) {
        if (dpi > 0) h += ' ';
        h += '<span class="b b-g" style="font-size:9px;padding:2px 6px">' + e(aj2.depends_on[dpi]) + '</span>';
      }
      h += '</td>';
    } else {
      h += '<td style="color:var(--text3)">\u2014</td>';
    }
    h += '</tr>';
  }
  h += '</tbody></table></div></div>';
}

// 4. Scenario Matrix (supports both {paths:[...], expected_return} and flat array)
var smPaths = Array.isArray(D.scenario_matrix) ? D.scenario_matrix : (D.scenario_matrix && D.scenario_matrix.paths ? D.scenario_matrix.paths : []);
var smExpRet = D.scenario_matrix && D.scenario_matrix.expected_return ? D.scenario_matrix.expected_return : '';
if (smPaths.length) {
  h += '<div class="card"><div class="card-title">\u60C5\u666F\u77E9\u9635</div>';
  h += '<div class="table-wrap"><table class="data-tbl" style="min-width:600px"><thead><tr>';
  h += '<th>\u8DEF\u5F84</th><th>\u6982\u7387</th><th>\u63CF\u8FF0</th><th>\u5F71\u54CD</th><th>\u7EC4\u5408\u56DE\u62A5</th>';
  h += '</tr></thead><tbody>';
  for (var sci2 = 0; sci2 < smPaths.length; sci2++) {
    var scenario = smPaths[sci2];
    var pColor = probColor(scenario.probability);
    h += '<tr>';
    h += '<td style="font-weight:700;color:var(--text)">' + md(scenario.path) + '</td>';
    h += '<td class="mono" style="color:' + pColor + ';font-weight:700">' + e(scenario.probability ? scenario.probability + '%' : '\u2014') + '</td>';
    h += '<td style="color:var(--text2);font-size:12px">' + md(scenario.description || '\u2014') + '</td>';
    h += '<td style="color:var(--text2);font-size:12px">' + md(scenario.impact || '\u2014') + '</td>';
    h += '<td class="mono" style="color:var(--green);font-weight:600">' + e(scenario.portfolio_return || '\u2014') + '</td>';
    h += '</tr>';
  }
  if (smExpRet) {
    h += '<tr style="border-top:2px solid rgba(255,255,255,.1)"><td colspan="4" style="font-weight:700;color:var(--text);text-align:right">\u671F\u671B\u56DE\u62A5</td>';
    h += '<td class="mono" style="font-weight:700;color:var(--green);font-size:16px">' + e(smExpRet) + '</td></tr>';
  }
  h += '</tbody></table></div></div>';
}

// 5. Edge Conclusion
if (D.edge_conclusion) {
  h += '<div class="quote-block" style="border-color:var(--green);margin-top:6px">' + renderBlock(D.edge_conclusion) + '</div>';
}

// 6. Contrarian
if ((D.contrarian || []).length) {
  h += '<div class="card" style="border-left:4px solid var(--red)"><div class="card-title" style="color:#ef8f7d">\u53CD\u5411\u8BBA\u8BC1</div>';
  h += '<div class="card-body">';
  for (var cti = 0; cti < D.contrarian.length; cti++) {
    var ct = D.contrarian[cti];
    var ctReason = typeof ct === 'string' ? ct : (ct.reason || '');
    var ctProb = typeof ct === 'object' ? ct.probability : '';
    var ctImpact = typeof ct === 'object' ? ct.impact : '';
    h += '<div style="padding:8px 12px;background:rgba(212,74,50,.06);border:1px solid rgba(212,74,50,.15);border-radius:8px;display:flex;gap:12px;align-items:flex-start">';
    if (ctProb) h += '<span class="mono" style="color:var(--red);font-weight:700;font-size:13px;flex-shrink:0;min-width:32px">' + e(ctProb) + '%</span>';
    h += '<div style="flex:1;min-width:0">';
    h += '<div style="font-size:13px;font-weight:600;color:#ef8f7d;line-height:1.5">' + md(ctReason) + '</div>';
    if (ctImpact) h += '<div style="font-size:12px;color:var(--text3);margin-top:3px;line-height:1.5">\u2192 ' + md(ctImpact) + '</div>';
    h += '</div></div>';
  }
  h += '</div></div>';
}

h += '</div>'; // section-stack
h += '</div>'; // end assets

// ========== TAB 4: MONITOR ==========
h += '<div id="monitor" class="page-panel">';

// Status legend
h += '<div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em">';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot confirmed" style="width:8px;height:8px"></span>\u5DF2\u9A8C\u8BC1</span>';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot strong" style="width:8px;height:8px"></span>\u8D8B\u52BF\u5411\u597D</span>';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot approaching" style="width:8px;height:8px"></span>\u63A5\u8FD1\u89E6\u53D1</span>';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot watching" style="width:8px;height:8px"></span>\u89C2\u5BDF\u4E2D</span>';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot weakening" style="width:8px;height:8px"></span>\u8F6C\u5F31</span>';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot failing" style="width:8px;height:8px"></span>\u8BC1\u4F2A</span>';
h += '</div>';

h += '<div class="section-stack">';

// 1. Tipping Points Table
if (allTippingPoints.length) {
  h += '<div class="card"><div class="card-title">\u62D0\u70B9\u76D1\u63A7</div>';
  h += '<div class="table-wrap"><table class="data-tbl" style="min-width:780px"><thead><tr>';
  h += '<th>\u62D0\u70B9</th><th>\u5F53\u524D</th><th>\u9608\u503C</th><th>\u5047\u8BBE</th><th>\u6743\u91CD</th><th>\u6570\u636E\u6E90</th><th>\u72B6\u6001</th>';
  h += '</tr></thead><tbody>';
  for (var tpi = 0; tpi < allTippingPoints.length; tpi++) {
    var ip = allTippingPoints[tpi];
    var state = ipState(ip);
    var dotHtml = '<span class="tp-dot ' + state + '" style="width:8px;height:8px;margin-right:6px"></span>';
    var ds = ip.data_source || '';
    var isUrl = /^https?:\/\//.test(ds);
    var dsHtml = isUrl
      ? '<a href="' + e(ds) + '" target="_blank" rel="noopener noreferrer" style="color:var(--purple);font-size:11px">' + e(ds.replace(/^https?:\/\/(www\.)?/, '').split('/').slice(0, 2).join('/')) + '</a>'
      : '<span style="color:var(--text3);font-size:11px">' + e(ds || '\u2014') + '</span>';
    h += '<tr>';
    h += '<td style="font-weight:600">' + e(ip.event) + '</td>';
    h += '<td class="mono" style="color:var(--green-strong)">' + e(ip.current || '\u2014') + '</td>';
    h += '<td>' + e(ip.quantitative || ip.qualitative || '\u2014') + '</td>';
    h += '<td style="color:var(--green);white-space:nowrap">' + (ip.hypothesis_id ? e(ip.hypothesis_id) : '\u2014') + '</td>';
    h += '<td class="mono">' + e(ip.weight || '\u2014') + '</td>';
    h += '<td>' + dsHtml + '</td>';
    h += '<td style="white-space:nowrap">' + dotHtml + statusCn(state) + '</td>';
    h += '</tr>';
  }
  h += '</tbody></table></div></div>';
}

// 2. Catalysts Timeline
if ((D.catalysts || []).length) {
  h += '<div class="card"><div class="card-title">\u50AC\u5316\u5242\u65F6\u95F4\u7EBF</div>';
  h += '<div class="timeline">';
  var sortedCatalysts = D.catalysts.slice().sort(function(a, b) {
    return (a.date || '') < (b.date || '') ? -1 : (a.date || '') > (b.date || '') ? 1 : 0;
  });
  for (var cai = 0; cai < sortedCatalysts.length; cai++) {
    var cat = sortedCatalysts[cai];
    h += '<div class="tl-item">';
    h += '<span class="tl-date">' + e(cat.date) + '</span>';
    h += '<div class="tl-content">';
    h += '<div style="font-weight:600;color:var(--text)">' + md(cat.event) + '</div>';
    if (cat.targets) {
      var assetList = Array.isArray(cat.targets) ? cat.targets : String(cat.targets).split(',').map(function(s) { return s.trim(); });
      h += '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">';
      for (var ali = 0; ali < assetList.length; ali++) {
        h += '<span class="b b-g" style="font-size:9px;padding:3px 8px">' + e(assetList[ali]) + '</span>';
      }
      h += '</div>';
    }
    if (cat.expected_impact) h += '<div style="font-size:12px;color:var(--text3);margin-top:4px">' + md(cat.expected_impact) + '</div>';
    h += '</div></div>';
  }
  h += '</div></div>';
}

// 3. Risks Table
if ((D.risks || []).length) {
  h += '<div class="card"><div class="card-title">\u98CE\u9669\u8BC4\u4F30</div>';
  h += '<div class="table-wrap"><table class="data-tbl" style="min-width:700px"><thead><tr>';
  h += '<th>\u98CE\u9669</th><th>\u6982\u7387</th><th>\u5F71\u54CD</th><th>\u6CE2\u53CA\u6807\u7684</th><th>\u5BF9\u51B2</th>';
  h += '</tr></thead><tbody>';
  for (var rki = 0; rki < D.risks.length; rki++) {
    var risk = D.risks[rki];
    var pColor = probColor(risk.probability);
    h += '<tr>';
    h += '<td style="font-weight:600;color:var(--text)">' + md(risk.risk) + '</td>';
    h += '<td class="mono" style="color:' + pColor + ';font-weight:700">' + e(risk.probability ? risk.probability + '%' : '\u2014') + '</td>';
    h += '<td style="color:var(--text2)">' + md(risk.impact || '\u2014') + '</td>';
    if (risk.most_impacted) {
      var affList = Array.isArray(risk.most_impacted) ? risk.most_impacted : String(risk.most_impacted).split(',').map(function(s) { return s.trim(); });
      h += '<td>';
      for (var afi = 0; afi < affList.length; afi++) {
        h += '<span class="b b-o" style="font-size:9px;padding:3px 8px;margin:2px">' + e(affList[afi]) + '</span>';
      }
      h += '</td>';
    } else {
      h += '<td style="color:var(--text3)">\u2014</td>';
    }
    h += '<td style="font-size:12px;color:var(--text2)">' + md(risk.hedge || '\u2014') + '</td>';
    h += '</tr>';
  }
  h += '</tbody></table></div></div>';
}

// 4. Evolution Timeline
if ((D.evolution || []).length) {
  h += '<div class="card"><div class="card-title">\u957F\u671F\u6F14\u53D8</div>';
  h += '<div class="timeline">';
  for (var evi = 0; evi < D.evolution.length; evi++) {
    var ev = D.evolution[evi];
    h += '<div class="tl-item">';
    h += '<span class="tl-date">' + e(ev.period) + '</span>';
    h += '<div class="tl-content">';
    h += '<div style="font-weight:600;color:var(--text)">' + md(ev.event) + '</div>';
    h += '<div style="display:flex;gap:10px;margin-top:4px;font-size:12px">';
    if (ev.probability) h += '<span class="mono" style="color:var(--text3)">\u6982\u7387: ' + e(ev.probability) + '</span>';
    if (ev.investment_impact) h += '<span style="color:var(--text2)">\u5F71\u54CD: ' + md(ev.investment_impact) + '</span>';
    h += '</div>';
    h += '</div></div>';
  }
  h += '</div></div>';
}

// 4b. Terminal State
if (D.terminal_state) {
  h += '<div class="card"><div class="card-title">\u7EC8\u6001\u5224\u65AD</div>';
  h += '<div class="card-body"><div style="font-size:13px;color:var(--text2)">' + renderBlock(D.terminal_state) + '</div></div></div>';
}

// 5. Exit Framework — removed (internal module)
// 6. Discussion Notes — removed (internal module)

h += '</div>'; // section-stack
h += '</div>'; // end monitor

// Inject into DOM
$('app').innerHTML = h;
document.title = (D.title || 'Sector') + ' \u2014 Cortex';

// Tab switching
function showTab(id, btn) {
  document.querySelectorAll('.page-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  $(id).classList.add('active');
  if (btn) btn.classList.add('active');
}
</script>
</body>
</html>
