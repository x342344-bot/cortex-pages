// Action badge
function actionBadge(action) {
  if (!action) return '';
  var a = String(action);
  var aLow = a.toLowerCase();
  var cls = 'b-gr';
  if (aLow.includes('买入') || aLow.includes('buy') || aLow.includes('加仓')) cls = 'b-g';
  else if (aLow.includes('观望') || aLow.includes('hold') || aLow.includes('wait')) cls = 'b-y';
  else if (aLow.includes('回避') || aLow.includes('sell') || aLow.includes('avoid') || aLow.includes('减仓')) cls = 'b-r';
  return '<span class="b ' + cls + '">' + e(a) + '</span>';
}

// Format probability — avoids double-% (e.g. "30%" + "%" → "30%%")
function fmtProb(v) {
  if (v == null || v === '') return '\u2014';
  var s = String(v).trim();
  if (s.endsWith('%')) return s;
  var n = Number(s);
  if (!isNaN(n)) return n + '%';
  return s; // "高/中/低" etc.
}

// Heatmap class for score 1-5
function hmClass(val) {
  var n = parseInt(val);
  if (n >= 5) return 'hm-5';
  if (n === 4) return 'hm-4';
  if (n === 3) return 'hm-3';
  if (n === 2) return 'hm-2';
  if (n <= 1) return 'hm-1';
  return '';
}

// Scenario cell class
function scenarioClass(text) {
  var t = String(text || '');
  if (t.includes('\u2705')) return 'scenario-green';
  if (t.includes('\u26A0')) return 'scenario-yellow';
  if (t.includes('\u274C')) return 'scenario-red';
  return '';
}

// Probability color
function probColor(prob) {
  var p = parseFloat(prob);
  if (isNaN(p)) {
    var s = String(prob || '').toLowerCase();
    if (s.includes('high') || s.includes('\u9AD8')) return 'var(--red)';
    if (s.includes('med') || s.includes('\u4E2D')) return 'var(--yellow)';
    return 'var(--green)';
  }
  if (p > 30) return 'var(--red)';
  if (p >= 15) return 'var(--yellow)';
  return 'var(--green)';
}

// Parse valuation range "bear $X / base $Y / bull $Z"
function parseValRange(str) {
  if (!str) return null;
  var parts = String(str).split('/').map(function(s) { return s.trim(); });
  var result = {};
  for (var i = 0; i < parts.length; i++) {
    var p = parts[i];
    var m = p.match(/(bear|base|bull|low|mid|high)[\s:]*\$?([\d,.]+)/i);
    if (m) {
      var key = m[1].toLowerCase();
      if (key === 'low') key = 'bear';
      if (key === 'mid') key = 'base';
      if (key === 'high') key = 'bull';
      result[key] = parseFloat(m[2].replace(/,/g, ''));
    }
  }
  if (result.bear !== undefined || result.base !== undefined || result.bull !== undefined) return result;
  return null;
}

  h += '<th>\u6807\u7684</th><th>\u5224\u65AD</th><th>\u4F30\u503C\u6C34\u5E73</th><th>\u4F9D\u8D56\u5047\u8BBE</th>';
  h += '</tr></thead><tbody>';
  for (var aji = 0; aji < assetJudgments.length; aji++) {
    var aj2 = assetJudgments[aji];
    h += '<tr>';
    h += '<td style="font-weight:700;font-family:var(--mono);font-size:14px;color:var(--text)">' + e(aj2.symbol) + '</td>';
    var vd = String(aj2.verdict || '').toLowerCase();
    var vdSym = vd === 'buy_candidate' ? '\u25B2' : (vd === 'watch' ? '\u25D0' : (vd === 'avoid' ? '\u25BD' : '\u2014'));
    var vdCls = vd === 'buy_candidate' ? 'b-g' : (vd === 'watch' ? 'b-y' : (vd === 'avoid' ? 'b-gr' : 'b-gr'));
    h += '<td><span class="b ' + vdCls + '" style="font-size:11px">' + vdSym + ' ' + e(aj2.verdict || '\u2014') + '</span></td>';
    var vl = String(aj2.valuation_level || '').toLowerCase();
    var vlColor = vl === 'undervalued' ? 'var(--green-strong)' : (vl === 'overvalued' ? 'var(--red)' : (vl === 'fair' ? 'var(--amber)' : 'var(--text-3)'));
    h += '<td><span style="font-size:11px;color:' + vlColor + ';font-weight:600">\u25CF ' + e(aj2.valuation_level || '\u2014') + '</span></td>';
    var deps = Array.isArray(aj2.depends_on) ? aj2.depends_on : (aj2.depends_on ? [String(aj2.depends_on)] : []);
    if (deps.length) {
      h += '<td style="font-size:11px">';
      for (var dpi = 0; dpi < deps.length; dpi++) {
        if (dpi > 0) h += ' ';
        h += '<span class="b b-g" style="font-size:11px;padding:2px 6px">' + e(deps[dpi]) + '</span>';
      }
      h += '</td>';
    } else {
      h += '<td style="color:var(--text3)">\u2014</td>';
    }
    h += '</tr>';
  }
  h += '</tbody></table></div></div>';
}

// 4. Scenario Matrix (supports both {paths:[...], expected_return} and flat array)
var smPaths = Array.isArray(D.scenario_matrix) ? D.scenario_matrix : (D.scenario_matrix && D.scenario_matrix.paths ? D.scenario_matrix.paths : []);
var smExpRet = D.scenario_matrix && D.scenario_matrix.expected_return ? D.scenario_matrix.expected_return : '';
if (smPaths.length) {
  h += '<div class="panel"><div class="panel-title"><span style="margin-right:6px;color:var(--accent)">\u229E</span>\u60C5\u666F\u77E9\u9635</div>';
  h += '<div class="table-wrap"><table class="data-tbl" style="min-width:600px"><thead><tr>';
  h += '<th>\u8DEF\u5F84</th><th>\u6982\u7387</th><th>\u63CF\u8FF0</th><th>\u5F71\u54CD</th><th>\u7EC4\u5408\u56DE\u62A5</th>';
  h += '</tr></thead><tbody>';
  for (var sci2 = 0; sci2 < smPaths.length; sci2++) {
    var scenario = smPaths[sci2];
    var pColor = probColor(scenario.probability);
    h += '<tr>';
    h += '<td style="font-weight:700;color:var(--text)">' + md(scenario.path) + '</td>';
    h += '<td class="mono" style="color:' + pColor + ';font-weight:700">' + e(fmtProb(scenario.probability)) + '</td>';
    h += '<td style="color:var(--text2);font-size:12px">' + md(scenario.description || '\u2014') + '</td>';
    h += '<td style="color:var(--text2);font-size:12px">' + md(scenario.impact || '\u2014') + '</td>';
    h += '<td class="mono" style="color:var(--green);font-weight:600">' + e(scenario.portfolio_return || '\u2014') + '</td>';
    h += '</tr>';
  }
  if (smExpRet) {
    h += '<tr style="border-top:2px solid rgba(0,0,0,.10)"><td colspan="4" style="font-weight:700;color:var(--text);text-align:right">\u671F\u671B\u56DE\u62A5</td>';
    h += '<td class="mono" style="font-weight:700;color:var(--green);font-size:16px">' + e(smExpRet) + '</td></tr>';
  }
  h += '</tbody></table></div></div>';
}

// 5. Edge Conclusion
if (D.edge_conclusion) {
  h += '<div class="quote-block" style="border-color:var(--green);margin-top:6px">' + renderBlock(D.edge_conclusion) + '</div>';
}

// 6. Contrarian
if ((D.contrarian || []).length) {
  h += '<div class="panel" style="border-left:4px solid var(--red)"><div class="panel-title" style="color:var(--red)"><span style="margin-right:6px">\u26A0</span>\u53CD\u5411\u8BBA\u8BC1</div>';
  h += '<div class="panel-body">';
  for (var cti = 0; cti < D.contrarian.length; cti++) {
    var ct = D.contrarian[cti];
    var ctReason = typeof ct === 'string' ? ct : (ct.reason || '');
    var ctProb = typeof ct === 'object' ? ct.probability : '';
    var ctImpact = typeof ct === 'object' ? ct.impact : '';
    h += '<div style="padding:8px 12px;background:rgba(211,31,31,.06);border:1px solid rgba(211,31,31,.15);border-radius:8px;display:flex;gap:12px;align-items:flex-start">';
    if (ctProb) h += '<span class="mono" style="color:var(--red);font-weight:700;font-size:12px;flex-shrink:0;min-width:32px">' + e(fmtProb(ctProb)) + '</span>';
    h += '<div style="flex:1;min-width:0">';
    h += '<div style="font-size:12px;font-weight:600;color:var(--red);line-height:1.5">' + md(ctReason) + '</div>';
    if (ctImpact) h += '<div style="font-size:12px;color:var(--text3);margin-top:3px;line-height:1.5">\u2192 ' + md(ctImpact) + '</div>';
    h += '</div></div>';
  }
  h += '</div></div>';
}

// extensions: assets
h += '<div class="extensions-host" data-tab="assets"></div>';

h += '</div>'; // section-stack
h += '</div>'; // end assets

// ========== TAB SENTINEL: 认知（河流图 + Hover Tooltip + Click Drawer） ==========
// 渲染逻辑见 assets/sentinel-page.js · window.renderSentinel(data, host)
h += '<div id="sentinel" class="page-panel"><div id="sentinel-host"></div></div>';

// ========== TAB 4: MONITOR ==========
h += '<div id="monitor" class="page-panel">';

// Status legend
h += '<div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em">';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot confirmed" style="width:8px;height:8px"></span>\u5DF2\u9A8C\u8BC1</span>';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot strong" style="width:8px;height:8px"></span>\u8D8B\u52BF\u5411\u597D</span>';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot approaching" style="width:8px;height:8px"></span>\u63A5\u8FD1\u89E6\u53D1</span>';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot watching" style="width:8px;height:8px"></span>\u89C2\u5BDF\u4E2D</span>';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot weakening" style="width:8px;height:8px"></span>\u8F6C\u5F31</span>';
h += '<span style="display:flex;align-items:center;gap:6px"><span class="tp-dot failing" style="width:8px;height:8px"></span>\u8BC1\u4F2A</span>';
h += '</div>';

h += '<div class="section-stack">';

// 1. Tipping Points Table
if (allTippingPoints.length) {
  h += '<div class="panel"><div class="panel-title"><span style="margin-right:6px;color:var(--accent)">\u25C9</span>\u62D0\u70B9\u76D1\u63A7</div>';
  h += '<div class="table-wrap"><table class="data-tbl" style="min-width:780px"><thead><tr>';
  h += '<th>\u62D0\u70B9</th><th>\u5F53\u524D</th><th>\u9608\u503C</th><th>\u5047\u8BBE</th><th>\u6743\u91CD</th><th>\u6570\u636E\u6E90</th><th>\u72B6\u6001</th>';
  h += '</tr></thead><tbody>';
  for (var tpi = 0; tpi < allTippingPoints.length; tpi++) {
    var ip = allTippingPoints[tpi];
    var state = ipState(ip);
    var dotHtml = '<span class="tp-dot ' + state + '" style="width:8px;height:8px;margin-right:6px"></span>';
    var ds = ip.data_source || '';
    var isUrl = /^https?:\/\//.test(ds);
    var dsHtml = isUrl
      ? '<a href="' + e(ds) + '" target="_blank" rel="noopener noreferrer" style="color:var(--purple);font-size:11px">' + e(ds.replace(/^https?:\/\/(www\.)?/, '').split('/').slice(0, 2).join('/')) + '</a>'
      : '<span style="color:var(--text3);font-size:11px">' + e(ds || '\u2014') + '</span>';
    h += '<tr>';
    h += '<td style="font-weight:600">' + e(ip.event) + '</td>';
    h += '<td class="mono" style="color:var(--green-strong)">' + e(ip.current || '\u2014') + '</td>';
    h += '<td>' + e(ip.quantitative || ip.qualitative || '\u2014') + '</td>';
    h += '<td style="color:var(--green);white-space:nowrap">' + (ip.hypothesis_id ? e(ip.hypothesis_id) : '\u2014') + '</td>';
    h += '<td class="mono">' + e(ip.weight || '\u2014') + '</td>';
    h += '<td>' + dsHtml + '</td>';
    h += '<td style="white-space:nowrap">' + dotHtml + statusCn(state) + '</td>';
    h += '</tr>';
  }
  h += '</tbody></table></div></div>';
}

// 2. Catalysts Timeline
if ((D.catalysts || []).length) {
  h += '<div class="panel"><div class="panel-title"><span style="margin-right:6px;color:var(--accent)">\u25B6</span>\u50AC\u5316\u5242\u65F6\u95F4\u7EBF</div>';
  h += '<div class="timeline">';
  var sortedCatalysts = D.catalysts.slice().sort(function(a, b) {
    return (a.date || '') < (b.date || '') ? -1 : (a.date || '') > (b.date || '') ? 1 : 0;
  });
  for (var cai = 0; cai < sortedCatalysts.length; cai++) {
    var cat = sortedCatalysts[cai];
    h += '<div class="tl-item">';
    h += '<span class="tl-date">' + e(cat.date) + '</span>';
    h += '<div class="tl-content">';
    h += '<div style="font-weight:600;color:var(--text)">' + md(cat.event) + '</div>';
    if (cat.targets) {
      var assetList = Array.isArray(cat.targets) ? cat.targets : String(cat.targets).split(',').map(function(s) { return s.trim(); });
      h += '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">';
      for (var ali = 0; ali < assetList.length; ali++) {
        h += '<span class="b b-g" style="font-size:11px;padding:3px 8px">' + e(assetList[ali]) + '</span>';
      }
      h += '</div>';
    }
    if (cat.expected_impact) h += '<div style="font-size:12px;color:var(--text3);margin-top:4px">' + md(cat.expected_impact) + '</div>';
    h += '</div></div>';
  }
  h += '</div></div>';
}

// 3. Risks Table
if ((D.risks || []).length) {
  h += '<div class="panel"><div class="panel-title"><span style="margin-right:6px;color:var(--red)">\u26A0</span>\u98CE\u9669\u8BC4\u4F30</div>';
  h += '<div class="table-wrap"><table class="data-tbl" style="min-width:700px"><thead><tr>';
  h += '<th>\u98CE\u9669</th><th>\u6982\u7387</th><th>\u5F71\u54CD</th><th>\u6CE2\u53CA\u6807\u7684</th><th>\u5BF9\u51B2</th>';
  h += '</tr></thead><tbody>';
  for (var rki = 0; rki < D.risks.length; rki++) {
    var risk = D.risks[rki];
    var pColor = probColor(risk.probability);
    h += '<tr>';
    h += '<td style="font-weight:600;color:var(--text)">' + md(risk.risk) + '</td>';
    h += '<td class="mono" style="color:' + pColor + ';font-weight:700">' + e(fmtProb(risk.probability)) + '</td>';
    h += '<td style="color:var(--text2)">' + md(risk.impact || '\u2014') + '</td>';
    if (risk.most_impacted) {
      var affList = Array.isArray(risk.most_impacted) ? risk.most_impacted : String(risk.most_impacted).split(',').map(function(s) { return s.trim(); });
      h += '<td>';
      for (var afi = 0; afi < affList.length; afi++) {
        h += '<span class="b b-o" style="font-size:11px;padding:3px 8px;margin:2px">' + e(affList[afi]) + '</span>';
      }
      h += '</td>';
    } else {
      h += '<td style="color:var(--text3)">\u2014</td>';
    }
    h += '<td style="font-size:12px;color:var(--text2)">' + md(risk.hedge || '\u2014') + '</td>';
    h += '</tr>';
  }
  h += '</tbody></table></div></div>';
}

// 4. Evolution Timeline
if ((D.evolution || []).length) {
  h += '<div class="panel"><div class="panel-title"><span style="margin-right:6px;color:var(--accent)">\u2192</span>\u957F\u671F\u6F14\u53D8</div>';
  h += '<div class="timeline">';
  for (var evi = 0; evi < D.evolution.length; evi++) {
    var ev = D.evolution[evi];
    h += '<div class="tl-item">';
    h += '<span class="tl-date">' + e(ev.period) + '</span>';
    h += '<div class="tl-content">';
    h += '<div style="font-weight:600;color:var(--text)">' + md(ev.event) + '</div>';
    h += '<div style="display:flex;gap:10px;margin-top:4px;font-size:12px">';
    if (ev.probability) h += '<span class="mono" style="color:var(--text3)">\u6982\u7387: ' + e(ev.probability) + '</span>';
    if (ev.investment_impact) h += '<span style="color:var(--text2)">\u5F71\u54CD: ' + md(ev.investment_impact) + '</span>';
    h += '</div>';
    h += '</div></div>';
  }
  h += '</div></div>';
}

// 4b. Terminal State
if (D.terminal_state) {
  h += '<div class="panel"><div class="panel-title"><span style="margin-right:6px;color:var(--accent)">\u25CE</span>\u7EC8\u6001\u5224\u65AD</div>';
  h += '<div class="panel-body"><div style="font-size:12px;color:var(--text2)">' + renderBlock(D.terminal_state) + '</div></div></div>';
}

// 5. Exit Framework — removed (internal module)
// 6. Discussion Notes — removed (internal module)

// extensions: monitor
h += '<div class="extensions-host" data-tab="monitor"></div>';

h += '</div>'; // section-stack
h += '</div>'; // end monitor

// Inject into DOM
$('app').innerHTML = h;
document.title = (D.title || 'Sector') + ' \u2014 Cortex';

// Render sentinel tab via assets/sentinel-page.js
if (D.sentinel && D.sentinel.namespace) {
  window.renderSentinel(D.sentinel, '#sentinel-host');
}

// Render extensions (\u7075\u6d3b\u5b57\u6bb5) \u2014 \u6309 section \u6ce8\u5165\u5230\u5bf9\u5e94 tab \u7684 extensions-host \u5bb9\u5668
// sector-writer \u4ece s6_report \u7684\u81ea\u7531 fence (svg-portal / html-portal / yaml-portal-extension) \u6536\u96c6
// \u6e32\u67d3\u89c4\u5219\uff1aexperimental-{slug} \u8d70 body \u76f4\u51fa\uff1b\u6b63\u5f0f module (\u6709\u5bf9\u5e94 modules/{type}/template.html) \u8d70 data + template (Phase 5 \u6c89\u6dc0\u540e\u542f\u7528)
if (Array.isArray(D.extensions) && D.extensions.length) {
  // v6: hero visual (type \u4ee5 `hero-` \u5f00\u5934 OR `-svg` \u7ed3\u5c3e) \u7f6e\u9876 + \u5360\u5168\u5bbd
  var heroExts = [], supportExts = [];
  for (var exi0 = 0; exi0 < D.extensions.length; exi0++) {
    var ext0 = D.extensions[exi0];
    if (!ext0 || !ext0.section || ext0.section === 'sentinel') continue;
    var t = String(ext0.type || '');
    var isHero = /^hero-/.test(t) || /-svg$/.test(t);
    (isHero ? heroExts : supportExts).push(ext0);
  }
  // \u5148\u6ce8\u5165 hero\uff08\u5360\u9876\u90e8\uff09\uff0c\u540e\u6ce8\u5165 support
  function injectExt(ext, isHero) {
    var hostEl = document.querySelector('.extensions-host[data-tab="' + ext.section + '"]');
    if (!hostEl) return;
    var slug = String(ext.type || 'experimental-unnamed').replace(/^experimental-/, '').replace(/[^a-z0-9\-_]/gi, '');
    var cardClass = isHero ? 'extension-card hero-card cortex-module-' + slug : 'extension-card cortex-module-' + slug;
    var cardStyle = isHero
      ? 'margin:0 0 18px 0;padding:18px;background:var(--bg-1);border:1px solid var(--border);border-radius:10px;box-shadow:0 1px 3px rgba(18,20,27,0.04);width:100%'
      : 'margin:12px 0;box-shadow:0 1px 2px rgba(18,20,27,0.02)';
    var card = '<div class="' + cardClass + '" style="' + cardStyle + '">';
    if (ext.title) {
      var titleStyle = isHero
        ? 'font-size:13px;color:var(--text-2);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px'
        : 'font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px';
      card += '<div class="extension-title" style="' + titleStyle + '">' + e(ext.title) + '</div>';
    }
    if (ext.body) {
      card += '<div class="extension-body">' + ext.body + '</div>';
    } else if (ext.data) {
      card += '<div class="extension-data" style="padding:8px;background:rgba(0,0,0,.03);border-radius:6px;font-size:11px;color:var(--text3)"><em>structured data (\u5f85 module template \u6e32\u67d3):</em><pre style="margin:4px 0 0 0;font-size:11px;overflow-x:auto">' + JSON.stringify(ext.data, null, 2) + '</pre></div>';
    }
    card += '</div>';
    // hero \u7528 prepend (\u9876\u90e8) / support \u7528 append (\u5e95\u90e8)
    if (isHero) {
      hostEl.insertAdjacentHTML('afterbegin', card);
    } else {
      hostEl.insertAdjacentHTML('beforeend', card);
    }
  }
  // \u5148\u6ce8\u5165 support\uff08\u6309\u987a\u5e8f beforeend\uff09\uff0c\u518d\u6ce8\u5165 hero\uff08afterbegin \u63a8\u5230\u9876\u90e8\uff09
  supportExts.forEach(function(e) { injectExt(e, false); });
  heroExts.forEach(function(e) { injectExt(e, true); });
}

</script>
</body>
</html>
