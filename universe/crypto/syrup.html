<style>
/* === Asset-page overrides on dashboard.css === */
.dashboard { padding-top:40px; padding-bottom:96px; }
.header { padding:0 0 28px; margin-bottom:24px; }
.header h1 { font-size:clamp(38px, 5vw, 56px); }
.header-sub { margin-top:12px; }
.b { font-size:10px; padding:7px 12px; }
.tabs { margin-bottom:32px; }
.tab { padding:12px 18px; }
.section-stack { gap:24px; }
.split-grid { gap:24px; }
.panel { padding:24px 24px 22px; }
.panel::after {
  content:'';position:absolute;
  left:24px;right:24px;top:0;height:1px;
  background:linear-gradient(90deg, rgba(94,95,218,.35), rgba(94,95,218,0));
}
.panel-title { margin-bottom:18px; }
.panel-body { gap:14px; }
.km-grid { grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); }
.km-item { padding:12px 14px; }
.km-value { font-size:16px; margin-top:4px; }
.km-note { margin-top:2px; }
.timeline { gap:16px; }
.tl-date { min-width:96px; }
.eyebrow { margin-bottom:12px; }
.note-card { padding:18px; }
.note-card-title { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.14em; font-weight:900; margin-bottom:10px; }
.note-list { display:flex; flex-direction:column; gap:14px; }
.arrow { margin-left:6px; }
.belief.open .arrow { transform:rotate(180deg); }

/* === Asset-specific layout grids === */
.overview-grid,
.monitor-grid,
.log-grid { display:grid; gap:24px; }
.overview-grid { grid-template-columns:minmax(0, 1.7fr) minmax(300px, .9fr); align-items:start; }
.monitor-grid,
.log-grid { grid-template-columns:minmax(0, 1.45fr) minmax(280px, .85fr); align-items:start; }

/* === Tree Visualization === */
.tree { display:flex; flex-direction:column; align-items:center; padding:6px 0 2px; }
.tree-line { width:2px; height:40px; background:linear-gradient(180deg, rgba(94,95,218,.6), rgba(94,95,218,.12)); }
.tree-root {
  width:min(100%, 760px);padding:20px 24px;
  background:var(--bg-1);
  border:1px solid rgba(94,95,218,.2);border-radius:var(--radius);text-align:left;
  box-shadow:0 2px 10px rgba(18,20,27,.06), inset 0 1px 0 rgba(94,95,218,.06);
}
.tree-branch { display:flex; gap:14px; position:relative; padding-top:32px; width:100%; justify-content:center; overflow-x:auto; }
.tree-branch::before { content:''; position:absolute; top:0; left:14%; right:14%; height:2px; background:linear-gradient(90deg, rgba(94,95,218,.15), rgba(94,95,218,.6), rgba(94,95,218,.15)); }
.tree-branch .tree-node { position:relative; }
.tree-branch .tree-node::before { content:''; position:absolute; top:-32px; left:50%; width:2px; height:32px; background:linear-gradient(180deg, rgba(94,95,218,.6), rgba(94,95,218,.12)); }
.tree-root-top { display:flex; flex-direction:column; gap:14px; }
.tree-root-left { display:flex; flex-direction:column; gap:8px; }
.tree-root-title { font-size:22px; font-weight:700; line-height:1; letter-spacing:-.02em; text-transform:uppercase; }
.tree-root-summary { font-size:12px; color:var(--text2); line-height:1.7; }
.tree-h {
  flex:1;min-width:160px;max-width:280px;flex:1 1 0;padding:20px;
  background:var(--bg-2);
  border:1px solid var(--border);border-radius:var(--radius);text-align:left;
  cursor:pointer;transition:all .18s ease;box-shadow:var(--shadow-sm);
  --layer-color:var(--accent);
}
.tree-h::after { content:'';position:absolute;left:20px;right:20px;top:0;height:2px;border-radius:999px;background:linear-gradient(90deg, var(--layer-color), rgba(0,0,0,0));opacity:.9; }
.tree-h:hover { border-color:var(--border-hover); transform:translateY(-2px); box-shadow:0 4px 14px rgba(18,20,27,.08); }
.tree-h-head { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; margin-bottom:16px; }
.tree-h-title { font-size:15px; font-weight:800; line-height:1.35; margin-top:12px; }
.tree-h-sub { font-size:12px; color:var(--text2); line-height:1.8; margin-top:12px; }
.tree-h .tp-list { margin-top:14px; display:flex; flex-direction:column; gap:6px; }
.tree-h .tp-mini { display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;padding:8px 10px;background:var(--bg-panel);border-radius:var(--radius-sm);border:1px solid rgba(0,0,0,.06); }
.tree-h .tp-mini-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; border:2px solid currentColor; background:transparent; }

/* === Metric Row === */
.metric-row { display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid rgba(0,0,0,.06);font-size:13px; }
.metric-row:last-child { border-bottom:none; }
.metric-row .k { color:var(--text3); font-size:11px; text-transform:uppercase; letter-spacing:.12em; font-weight:800; }
.metric-row .v { font-family:var(--mono); font-weight:700; font-size:16px; text-align:right; }
.metric-note { display:block; margin-top:6px; font-size:11px; color:var(--text3); font-family:var(--font); font-weight:600; max-width:30ch; }

/* === Indicator Grid === */
.indicator-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:10px; }
.indicator-card { background:rgba(0,0,0,.04); border:1px solid rgba(0,0,0,.06); border-radius:8px; padding:12px 14px; }
.indicator-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.12em; font-weight:800; margin-bottom:6px; }
.indicator-current { font-family:var(--mono); font-weight:700; font-size:15px; color:var(--text); }
.indicator-signal { font-size:11px; font-weight:600; margin-top:4px; }

/* === Belief (Scored Collapsible) === */
.belief { background:var(--bg-2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow-sm); }
.belief-head { padding:22px 24px 18px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;cursor:pointer;user-select:none;position:relative;--layer-color:var(--accent); }
.belief-head::before { content:'';position:absolute;left:24px;right:24px;top:0;height:2px;border-radius:999px;background:linear-gradient(90deg, var(--layer-color), rgba(0,0,0,0)); }
.belief-head:hover { background:rgba(0,0,0,.03); }
.belief-body { padding:0 24px 24px; display:none; }
.belief.open .belief-body { display:block; }
.belief-title { font-size:24px; font-weight:800; line-height:1.08; margin-top:12px; }
.belief-desc { font-size:12px; color:var(--text3); margin-top:8px; text-transform:uppercase; letter-spacing:.12em; font-weight:800; }
.belief-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.belief-score { text-align:right; }
.belief-score-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.14em; font-weight:800; }
.belief-score-value { font-size:22px; margin-top:4px; }
.belief-progress { width:120px; margin-top:10px; }
.belief-block-title { margin-top:18px; margin-bottom:10px; font-size:11px; font-weight:900; color:var(--text3); text-transform:uppercase; letter-spacing:.16em; }

/* === Tipping Point (extended) === */
.tp { display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--bg-panel);border-radius:var(--radius);margin-top:8px;border:1px solid rgba(0,0,0,.04); }
.tp-main { flex:1; display:flex; flex-direction:column; gap:4px; }
.tp-text { flex:1; font-size:14px; font-weight:700; line-height:1.5; font-family:var(--font); }
.tp-meta { display:flex; flex-wrap:wrap; gap:10px; font-size:12px; color:var(--text3); font-family:var(--font); }
.tp-sig { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; font-family:var(--mono); }
.tp-outcome { font-size:12px; line-height:1.5; color:var(--text2); font-family:var(--font); }
.tp-outcome strong { color:var(--text); }

/* === Event Log === */
.ev-item { display:flex;gap:10px;padding:10px 0;font-size:13px;color:var(--text2);border-bottom:1px solid rgba(0,0,0,.05); }
.ev-item:last-child { border-bottom:none; }
.ev-icon { color:var(--green); flex-shrink:0; width:18px; text-align:center; font-weight:900; }

/* === Insight Boxes === */
.ins { padding:15px 16px;border-radius:14px;font-size:12px;border:1px solid;display:flex;gap:12px;align-items:flex-start; }
.ins strong { color:var(--text); margin-right:8px; text-transform:uppercase; letter-spacing:.08em; }
.ins.bull { background:rgba(4,120,87,.07); border-color:rgba(4,120,87,.22); color:var(--green); }
.ins.bear { background:rgba(211,31,31,.08); border-color:rgba(211,31,31,.25); color:var(--red); }
.ins.warn { background:rgba(154,94,6,.10); border-color:rgba(154,94,6,.25); color:var(--yellow); }
.ins.info { background:rgba(37,99,235,.08); border-color:rgba(37,99,235,.30); color:var(--blue); }

/* === Monitor/Log Tables === */
.mon-tbl,.log-tbl { width:100%; border-collapse:collapse; font-size:12px; min-width:680px; }
.mon-tbl th,.mon-tbl td,.log-tbl th,.log-tbl td { padding:15px 16px; text-align:left; border-bottom:1px solid rgba(0,0,0,.06); vertical-align:top; }
.mon-tbl th,.log-tbl th { font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.16em;font-weight:900;background:rgba(0,0,0,.035); }
.mon-tbl tbody tr:hover,.log-tbl tbody tr:hover { background:rgba(0,0,0,.04); }

/* === Timeline (asset variant) === */
.tl-event { color:var(--text2); }
.tl-item:last-child .tl-event { color:var(--text); font-weight:700; }

/* === Pills === */
.pill-row { display:flex; flex-wrap:wrap; gap:8px; }

/* === Responsive === */
@media (max-width:1080px) {
  .overview-grid,.monitor-grid,.log-grid,.split-grid { grid-template-columns:1fr; }
}
@media (max-width:768px) {
  .dashboard { padding:20px 16px 56px; }
  .header { align-items:flex-start; }
  .header h1 { max-width:none; }
  .header-right { justify-content:flex-start; }
  .tree-branch { flex-direction:column; align-items:center; padding-top:0; }
  .tree-branch::before { display:none; }
  .tree-branch .tree-node::before { display:none; }
  .tree-root { padding:24px 18px; }
  .tree-root-top { grid-template-columns:1fr; }
  .tabs { overflow-x:auto; flex-wrap:nowrap; padding-bottom:8px; }
  .tab { flex:0 0 auto; }
  .belief-head { flex-direction:column; }
  .belief-score { text-align:left; }
}

}

  h += '<span style="color:var(--green)">● 分配/加仓</span>';
  h += '<span style="color:var(--red)">● 归还/退出</span>';
  h += '<span style="color:var(--blue)">● 更新</span>';
  h += '</div>';
  h += '<div class="timeline">';
  for (const t of mergedTimeline) {
    if (t.type === 'decision') {
      const color = t.decision_type === 'participate' || t.decision_type === 'add' ? 'var(--green)' : t.decision_type === 'return' || t.decision_type === 'exit' || t.decision_type === 'reduce' ? 'var(--red)' : 'var(--blue)';
      h += `<div class="tl-item" style="border-left:3px solid ${color};padding-left:12px;margin-left:-3px">`;
      h += `<span class="tl-date" style="color:${color}">${e(t.date)}</span>`;
      h += `<span class="tl-event"><span style="color:${color};font-weight:700">[${e(t.typeCn)}]</span> ${e(t.event)}`;
      if (t.amount) h += ` <span style="font-family:var(--mono);color:${color};font-weight:600">${e(t.amount)}</span>`;
      if (t.pct) h += ` <span style="font-family:var(--mono);color:var(--text3);font-size:11px">${e(t.pct)}</span>`;
      if (t.reasons) h += `<div style="font-size:11px;color:var(--text3);margin-top:2px">原因：${e(t.reasons)}</div>`;
      if (t.review) h += `<div style="font-size:11px;color:var(--text2);margin-top:2px">复盘：${e(t.review)}</div>`;
      h += '</span></div>';
    } else {
      const isDone = t.status === 'done' || t.status === 'completed';
      h += `<div class="tl-item"><span class="tl-date">${e(t.date)}</span><span class="tl-event${isDone ? ' style="color:var(--text3)"' : ''}">${e(t.event)}</span></div>`;
    }
  }
  h += '</div></div>';
}

// Event log (future daily hypothesis pipeline)
if ((D.event_log||[]).length) {
  h += '<div class="panel"><div class="panel-title">事件日志</div><div class="table-wrap"><table class="log-tbl"><thead><tr><th>日期</th><th>事件</th><th>类型</th><th>信息源</th><th>AI 判断</th><th>人工判断</th></tr></thead><tbody>';
  for (const ev of D.event_log) {
    const src = [ev.source_label, ev.source_type].filter(Boolean).join(' · ');
    h += `<tr><td class="mono" style="white-space:nowrap;color:var(--text3)">${e(ev.date)}</td><td><div style="font-weight:600">${e(ev.event || ev.summary || '—')}</div>${ev.summary ? `<div style="font-size:12px;color:var(--text3);margin-top:4px">${e(ev.summary)}</div>` : ''}</td><td>${e(ev.kind || '—')}</td><td>${ev.source_url ? `<a href="${e(ev.source_url)}" target="_blank" rel="noopener noreferrer" style="color:var(--green)">${e(src || '链接')}</a>` : e(src || '—')}</td><td style="color:var(--text2)">${e(ev.ai_judgment || '—')}</td><td style="color:var(--text2)">${e(ev.human_judgment || '—')}</td></tr>`;
  }
  h += '</tbody></table></div></div>';
}

// Hypothesis updates (future main format)
if ((D.hypothesis_updates||[]).length) {
  h += '<div class="panel"><div class="panel-title">假设更新流</div><div class="table-wrap"><table class="log-tbl"><thead><tr><th>日期</th><th>假设</th><th>状态</th><th>Confidence</th><th>Δ</th><th>原因</th></tr></thead><tbody>';
  for (const u of D.hypothesis_updates) {
    const hyp = u.hypothesis_id ? `${u.hypothesis_id}${u.hypothesis_title ? ' · ' + u.hypothesis_title : ''}` : (u.hypothesis_title || '—');
    h += `<tr><td class="mono" style="white-space:nowrap;color:var(--text3)">${e(u.date)}</td><td style="color:var(--green-strong)">${e(hyp)}</td><td class="mono" style="white-space:nowrap">${e(formatLogChange(u))}</td><td class="mono" style="white-space:nowrap">${e(fmtPct(u.confidence_before))} → ${e(fmtPct(u.confidence_after))}</td><td class="mono" style="white-space:nowrap;color:${Number(u.delta||0) >= 0 ? 'var(--green)' : 'var(--red)'}">${e(fmtDelta(u.delta))}</td><td><div style="color:var(--text2)">${e(u.reasoning || u.ai_judgment || '—')}</div>${u.human_judgment ? `<div style="font-size:12px;color:var(--text3);margin-top:4px">Fred: ${e(u.human_judgment)}</div>` : ''}</td></tr>`;
  }
  h += '</tbody></table></div></div>';
}

// Hypothesis versions (definition changes)
if ((D.hypothesis_versions||[]).length) {
  h += '<div class="panel"><div class="panel-title">假设版本变更</div><div class="table-wrap"><table class="log-tbl"><thead><tr><th>日期</th><th>假设</th><th>字段</th><th>变更</th><th>原因</th></tr></thead><tbody>';
  for (const v of D.hypothesis_versions) {
    h += `<tr><td class="mono" style="white-space:nowrap;color:var(--text3)">${e(v.date)}</td><td style="color:var(--green-strong)">${e(v.hypothesis_id || '—')}</td><td class="mono">${e(v.field || '—')}</td><td><div style="font-size:12px;color:var(--text3)">Before: ${e(v.before || '—')}</div><div style="margin-top:4px">After: ${e(v.after || '—')}</div></td><td style="color:var(--text2)">${e(v.reason || '—')}</td></tr>`;
  }
  h += '</tbody></table></div></div>';
}

// Legacy hypothesis log
if ((D.hypothesis_log||[]).length) {
  h += '<div class="panel"><div class="panel-title">假设更新日志（兼容旧版）</div><div class="table-wrap"><table class="log-tbl"><thead><tr><th>日期</th><th>事件</th><th>假设</th><th>变化</th><th>原因</th></tr></thead><tbody>';
  for (const l of D.hypothesis_log) {
    h += `<tr><td class="mono" style="white-space:nowrap;color:var(--text3)">${e(l.date)}</td><td>${e(l.event)}</td><td style="color:var(--green-strong)">${e(l.hypothesis)}</td><td class="mono" style="white-space:nowrap">${e(formatLogChange(l))}</td><td style="color:var(--text2)">${e(l.reasoning)}</td></tr>`;
  }
  h += '</tbody></table></div></div>';
}
if (hasStructuredLogs) {
  h += '</div><aside class="section-stack">';
  const lastUpdate = (D.hypothesis_updates||[])[0] || (D.hypothesis_log||[])[0];
  if (lastUpdate) {
    h += `<div class="note-card"><div class="note-card-title">最近更新</div><div style="font-size:13px;color:var(--text2);line-height:1.7"><div class="mono" style="color:var(--green-strong);font-size:12px;margin-bottom:8px">${e(lastUpdate.date || '—')}</div>${e(lastUpdate.event || lastUpdate.hypothesis_title || '暂无更新')}</div></div>`;
  }
  h += `<div class="note-card"><div class="note-card-title">日志结构</div><div style="font-size:12px;color:var(--text3);line-height:1.8">事件日志 = 发生了什么<br>假设更新流 = 判断怎么变<br>假设版本变更 = 假设定义怎么改</div></div>`;
  h += '</aside></div>';
} else {
  h += '</div>';
}
h += '</div>'; // end log

$('app').innerHTML = h;
document.title = (D.title || '未命名') + ' — Cortex';

</script>
</body>
</html>
