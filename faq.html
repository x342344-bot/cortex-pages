/* ═══════════ PAGE: CONTENT ═══════════ */

/* ========== PAGE HERO ========== */
.page-hero {
  padding: 72px 32px 24px;
  position: relative;
  overflow: hidden;
}
.page-hero::before {
  content: '';
  position: absolute;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 500px;
  background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
  pointer-events: none;
}
.page-hero .container {
  max-width: var(--max-width-wide);
  margin: 0 auto;
}
.page-hero h1 {
  font-size: 36px;
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -0.03em;
  color: var(--text-1);
}
.page-hero .page-subtitle {
  font-size: 15px;
  color: var(--text-2);
  margin-top: 10px;
  max-width: 560px;
  line-height: 1.6;
}
.hero-breadcrumb {
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 12px;
  letter-spacing: 0.02em;
}
.hero-breadcrumb a {
  color: var(--text-3);
  text-decoration: none;
  transition: color 0.15s;
}
.hero-breadcrumb a:hover { color: var(--accent-light); }

/* ========== TWO-COLUMN LAYOUT ========== */
.page-layout {
  display: flex;
  max-width: var(--max-width-wide);
  margin: 0 auto;
  padding: 8px 32px 80px;
  gap: 56px;
}
.page-content {
  flex: 1;
  min-width: 0;
  max-width: 760px;
}

/* ========== SIDEBAR TOC ========== */
.page-toc {
  width: 200px;
  flex-shrink: 0;
  position: sticky;
  top: 72px;
  max-height: calc(100vh - 88px);
  overflow-y: auto;
  padding: 8px 0;
  scrollbar-width: none;
}
.page-toc::-webkit-scrollbar { display: none; }
.toc-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-3);
  margin-bottom: 12px;
  padding-left: 12px;
}
.toc-list {
  list-style: none;
  padding: 0;
  margin: 0;
  position: relative;
}
.toc-list::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--border);
}
.toc-list li { margin: 0; }
.toc-list a {
  display: block;
  padding: 6px 12px 6px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-3);
  text-decoration: none;
  border-left: 1px solid transparent;
  margin-left: -1px;
  transition: all 0.2s;
  line-height: 1.4;
}
.toc-list a:hover {
  color: var(--text-2);
  text-decoration: none;
}
.toc-list a.active {
  color: var(--accent-light);
  border-left-color: var(--accent-light);
  font-weight: 600;
}
.toc-list .toc-h3 {
  padding-left: 26px;
  font-size: 11px;
  font-weight: 400;
}
@media (max-width: 960px) {
  .page-toc { display: none; }
  .page-layout { max-width: var(--max-width); }
}

/* ========== MARKDOWN BODY ========== */

/* --- H2: Section Headers --- */
.md-body h2 {
  font-size: 20px;
  font-weight: 700;
  margin: 56px 0 20px;
  padding: 0 0 12px;
  color: var(--text-1);
  border: none;
  position: relative;
  scroll-margin-top: 72px;
  letter-spacing: -0.01em;
}
.md-body h2::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, var(--accent-light), transparent);
  border-radius: 1px;
}
.md-body h2:first-child { margin-top: 8px; }

/* --- H3: Sub-sections --- */
.md-body h3 {
  font-size: 16px;
  font-weight: 700;
  margin: 36px 0 12px;
  color: var(--text-1);
  scroll-margin-top: 72px;
  letter-spacing: -0.005em;
}

/* --- H4: Detail headers --- */
.md-body h4 {
  font-size: 13px;
  font-weight: 700;
  margin: 24px 0 8px;
  color: var(--accent-light);
  letter-spacing: 0.02em;
}

/* --- H5: Fine detail --- */
.md-body h5 {
  font-size: 13px;
  font-weight: 600;
  margin: 18px 0 6px;
  color: var(--text-2);
}

/* --- Body text --- */
.md-body p {
  font-size: 14px;
  line-height: 1.75;
  color: var(--text-2);
  margin-bottom: 12px;
}
.md-body strong {
  color: var(--text-1);
  font-weight: 600;
}
.md-body em {
  color: var(--text-2);
  font-style: italic;
}

/* ========== LISTS ========== */
.md-body > ul,
.md-body > ol {
  margin: 16px 0;
  padding: 0;
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.md-body > ul > li,
.md-body > ol > li {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-2);
  padding: 10px 16px;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: border-color 0.2s, background 0.2s;
}
.md-body > ul > li:hover,
.md-body > ol > li:hover {
  border-color: var(--border-hover);
  background: var(--bg-2);
}
.md-body > ul > li strong,
.md-body > ol > li strong {
  color: var(--text-1);
  font-weight: 600;
}

/* Nested lists */
.md-body li ul,
.md-body li ol {
  margin: 8px 0 2px;
  padding-left: 16px;
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.md-body li li {
  font-size: 13px;
  line-height: 1.65;
  color: var(--text-2);
  padding: 2px 0;
  background: none;
  border: none;
  border-radius: 0;
  position: relative;
  padding-left: 14px;
}
.md-body li li:hover {
  border-color: transparent;
  background: none;
}
.md-body li li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 10px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--text-3);
}
.md-body li li li::before {
  background: transparent;
  border: 1px solid var(--text-3);
  width: 3px;
  height: 3px;
}
.md-body li li strong {
  color: var(--text-1);
  font-weight: 600;
}

/* ========== BLOCKQUOTE ========== */
.md-body blockquote {
  border: none;
  padding: 14px 20px;
  margin: 20px 0;
  background: var(--accent-glow);
  border-radius: var(--radius-sm);
  position: relative;
  overflow: hidden;
}
.md-body blockquote::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--accent-light);
}
.md-body blockquote p {
  color: var(--text-1);
  margin-bottom: 0;
  font-size: 13px;
}

/* ========== CODE ========== */
.md-body code {
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--bg-2);
  padding: 2px 7px;
  border-radius: var(--radius-xs);
  color: var(--accent-light);
  border: 1px solid var(--border);
}
.md-body pre {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 20px;
  margin: 16px 0;
  overflow-x: auto;
}
.md-body pre code {
  background: none;
  padding: 0;
  border: none;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-2);
}

/* ========== TABLE ========== */
.md-body table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin: 20px 0;
  font-size: 13px;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.md-body th {
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-3);
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
}
.md-body td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text-2);
  vertical-align: top;
}
.md-body tr:last-child td { border-bottom: none; }
.md-body tr:hover td { background: rgba(255,255,255,0.02); }

.md-body hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 48px 0 8px;
}

/* ========== INDEX CARDS ========== */
.index-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
  margin-top: 16px;
}
.index-card {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 18px 20px;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.index-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-sm);
  padding: 1px;
  background: linear-gradient(135deg, var(--accent-glow), transparent, transparent);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.3s;
}
.index-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
}
.index-card:hover::before { opacity: 1; }
.index-card h4 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  text-transform: none;
  letter-spacing: -0.005em;
  color: var(--text-1);
}
.index-card p {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.5;
  margin-bottom: 0;
}
.index-card .index-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 7px;
  border-radius: var(--radius-xs);
  margin-bottom: 8px;
}
.index-tag-invest { background: var(--green-dim); color: var(--green); }
.index-tag-model { background: rgba(188,140,255,0.1); color: #bc8cff; }

/* ========== FAQ CARDS ========== */
.faq-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(380px, 100%), 1fr));
  gap: 12px;
}
.page-layout:has(.faq-grid) .page-content { max-width: 1100px; }
.faq-card {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  transition: border-color 0.2s;
}
.faq-card:hover { border-color: var(--border-hover); }
.faq-question {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent-light);
  margin-bottom: 12px;
  line-height: 1.4;
}
.faq-answer p {
  font-size: 13px;
  line-height: 1.75;
  color: var(--text-2);
  margin-bottom: 8px;
}
.faq-answer strong { color: var(--text-1); }
.faq-answer ul, .faq-answer ol {
  margin: 8px 0;
  padding-left: 20px;
}
.faq-answer li {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-2);
  margin-bottom: 4px;
  padding: 0;
  background: none;
  border: none;
}
.faq-answer li::before { display: none; }
.faq-answer li strong { color: var(--text-1); }
</style>

<script>
// Auto-generate TOC
(function() {
  const body = document.querySelector('.md-body');
  const tocList = document.getElementById('tocList');
  const tocAside = document.getElementById('pageToc');
  if (!body || !tocList) return;

  const headings = body.querySelectorAll('h2, h3');
  if (headings.length < 2) {
    if (tocAside) tocAside.style.display = 'none';
    return;
  }

  headings.forEach((h, i) => {
    if (!h.id) h.id = 's-' + i;
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    if (h.tagName === 'H3') a.classList.add('toc-h3');
    a.addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById(h.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    li.appendChild(a);
    tocList.appendChild(li);
  });

  // Scroll spy
  const tocLinks = tocList.querySelectorAll('a');
  let current = null;
  const update = () => {
    let found = null;
    headings.forEach(h => {
      if (h.getBoundingClientRect().top <= 100) found = h;
    });
    if (found && found !== current) {
      current = found;
      tocLinks.forEach(l => l.classList.remove('active'));
      const active = tocList.querySelector('a[href="#' + found.id + '"]');
      if (active) active.classList.add('active');
    }
  };
  window.addEventListener('scroll', update, { passive: true });
  update();
})();
</script>
